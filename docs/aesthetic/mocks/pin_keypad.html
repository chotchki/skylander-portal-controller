<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=390,initial-scale=1,viewport-fit=cover">
<title>PIN Keypad — Heraldic — Skylanders Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Titan+One&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,800;1,9..144,400&display=swap" rel="stylesheet">
<style>
  :root {
    --sf-1: #0b1e52; --sf-2: #061436; --sf-3: #020818;
    --gb: #ffe58a; --g: #f5c634; --gm: #c58c18; --gs: #6e4a00; --gi: #3a2500;
    --text: #f7f7fb; --ink: #1a1203; --danger: #e34c4c;
    --el-magic: linear-gradient(135deg, #da5ad6, #651564);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Fraunces", Georgia, serif;
    background: #0a0a0a;
    display: grid; place-items: center;
    min-height: 100vh; padding: 20px;
  }
  .phone {
    width: 390px; height: 844px;
    border-radius: 52px; overflow: hidden; position: relative;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 12px #1a1a1a, 0 0 0 13px #333;
    background: var(--sf-3);
  }
  @media (max-width: 450px) {
    body { padding: 0; background: var(--sf-3); }
    .phone { width: 100vw; height: 100vh; border-radius: 0; box-shadow: none; }
  }
  .sky {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 120% 60% at 50% 0%, #1a3a8a 0%, transparent 50%),
      radial-gradient(ellipse 80% 50% at 50% 100%, #0e2464 0%, transparent 50%),
      linear-gradient(180deg, var(--sf-1), var(--sf-2) 60%, var(--sf-3));
  }
  .stars {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 20px 30px, white, transparent),
      radial-gradient(1px 1px at 40px 70px, rgba(255,255,255,0.7), transparent),
      radial-gradient(2px 2px at 50px 160px, rgba(255,230,180,0.9), transparent),
      radial-gradient(1px 1px at 130px 40px, white, transparent),
      radial-gradient(1px 1px at 90px 250px, rgba(255,255,255,0.8), transparent),
      radial-gradient(1px 1px at 170px 300px, white, transparent),
      radial-gradient(2px 2px at 230px 100px, rgba(180,220,255,0.9), transparent),
      radial-gradient(1px 1px at 300px 200px, white, transparent),
      radial-gradient(1px 1px at 260px 400px, white, transparent),
      radial-gradient(1px 1px at 60px 500px, white, transparent);
    background-size: 400px 800px;
    animation: drift 140s linear infinite;
  }
  @keyframes drift { to { background-position: -400px -800px; } }
  .screen {
    position: relative; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 44px 24px 32px;
  }

  /* back button — top left */
  .back-btn {
    position: absolute; top: 48px; left: 20px;
    font-family: "Titan One";
    font-size: 16px; color: var(--gb);
    background: transparent; border: 0; cursor: pointer;
    letter-spacing: 0.08em;
    text-shadow: 0 1px 0 var(--gs), 0 0 10px rgba(245,198,52,0.4);
  }
  .back-btn::before { content: "← "; }

  /* ---- TOP SECTION: bezel + name + dots (on starfield) ---- */
  .pin-identity {
    display: flex; flex-direction: column;
    align-items: center;
    margin-bottom: 20px;
  }
  .profile-bezel {
    width: 90px; height: 90px; border-radius: 50%;
    position: relative; display: grid; place-items: center;
    margin-bottom: 10px;
  }
  .bezel-ring {
    position: absolute; inset: 0; border-radius: 50%;
    background: radial-gradient(circle at 30% 25%, var(--gb) 0%, var(--g) 22%, var(--gm) 55%, var(--gs) 100%);
    box-shadow:
      inset 0 0 0 2px var(--gi),
      inset 0 3px 4px rgba(255,255,255,0.3),
      inset 0 -3px 4px rgba(0,0,0,0.5),
      0 0 0 1px #000,
      0 6px 16px rgba(0,0,0,0.5);
  }
  .bezel-plate {
    position: absolute; inset: 10%; border-radius: 50%;
    background: var(--el-magic);
    box-shadow:
      inset 0 0 0 1px rgba(0,0,0,0.6),
      inset 0 4px 8px rgba(255,255,255,0.25),
      inset 0 -6px 10px rgba(0,0,0,0.5);
    display: grid; place-items: center;
    color: #fff;
    font-family: "Titan One"; font-size: 40px;
    text-shadow: 0 3px 6px rgba(0,0,0,0.6);
  }
  .pin-prompt-name {
    font-family: "Titan One"; font-size: 26px;
    letter-spacing: 0.08em;
    color: var(--gb);
    -webkit-text-stroke: 1px var(--gi);
    text-shadow:
      0 2px 0 var(--gs),
      0 3px 0 var(--gi),
      0 0 20px rgba(245,198,52,0.4),
      0 5px 10px rgba(0,0,0,0.5);
    margin-bottom: 6px;
  }
  .pin-prompt-label {
    font-family: "Fraunces"; font-style: italic;
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,230,120,0.7);
    margin-bottom: 16px;
  }

  /* PIN dots — gold bezels on the starfield (great contrast) */
  .pin-dots {
    display: flex; gap: 20px;
    justify-content: center;
  }
  .pin-dot {
    width: 24px; height: 24px; border-radius: 50%;
    position: relative;
  }
  .pin-dot-ring {
    position: absolute; inset: 0; border-radius: 50%;
    background: radial-gradient(circle at 30% 25%, var(--gb), var(--gm) 60%, var(--gs));
    box-shadow:
      inset 0 0 0 1.5px var(--gi),
      inset 0 1px 2px rgba(255,255,255,0.3),
      inset 0 -1px 2px rgba(0,0,0,0.5),
      0 2px 6px rgba(0,0,0,0.4);
  }
  .pin-dot-fill {
    position: absolute; inset: 4px; border-radius: 50%;
    background: rgba(10,26,54,0.85);
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.6);
    transition: background 0.15s ease, box-shadow 0.15s ease;
  }
  .pin-dot.filled .pin-dot-fill {
    background: radial-gradient(circle at 40% 30%, #fff8d0, var(--gb) 40%, var(--g));
    box-shadow: 0 0 12px rgba(245,198,52,0.7), inset 0 1px 2px rgba(255,255,255,0.5);
    animation: dot-pop 0.2s cubic-bezier(.4,2.2,.5,1);
  }
  @keyframes dot-pop {
    from { transform: scale(0.5); } to { transform: scale(1); }
  }

  /* ---- KEYPAD PANEL (framed, contains only the number grid) ---- */
  .keypad-panel {
    width: 100%; max-width: 310px;
    padding: 18px 18px 14px;
    border-radius: 18px;
    position: relative;
    background:
      linear-gradient(180deg, rgba(16,40,90,0.85), rgba(8,22,60,0.9)),
      radial-gradient(ellipse 120% 80% at 50% 0%, rgba(255,230,120,0.06), transparent 60%);
    border: 2px solid transparent;
    background-clip: padding-box;
    animation: panel-in 0.4s cubic-bezier(.3,1.3,.5,1) both;
  }
  @keyframes panel-in {
    from { opacity: 0; transform: scale(0.92) translateY(14px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .keypad-panel::before {
    content: "";
    position: absolute; inset: -2px;
    border-radius: 20px;
    background: linear-gradient(135deg, var(--gb) 0%, var(--gm) 50%, var(--gb) 100%);
    z-index: -1;
  }
  .keypad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    max-width: 280px;
    margin: 0 auto;
  }
  .key {
    min-height: 64px; min-width: 64px;
    font-family: "Titan One";
    font-size: 24px;
    letter-spacing: 0.04em;
    color: var(--gb);
    background:
      linear-gradient(180deg, rgba(16,40,90,0.7), rgba(8,22,60,0.8));
    border: 1.5px solid rgba(245,198,52,0.25);
    border-radius: 14px;
    cursor: pointer;
    display: grid; place-items: center;
    transition: transform 0.1s ease, background 0.1s ease, border-color 0.1s ease;
    text-shadow: 0 1px 0 var(--gs), 0 0 8px rgba(245,198,52,0.3);
    box-shadow: 0 3px 0 rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,230,120,0.08);
  }
  .key:hover { border-color: rgba(245,198,52,0.5); }
  .key:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,230,120,0.08);
    background: linear-gradient(180deg, rgba(16,40,90,0.9), rgba(8,22,60,0.95));
  }
  .key.ghost {
    background: transparent; border-color: transparent;
    cursor: default; box-shadow: none;
  }
  .key.backspace {
    font-size: 20px;
    color: rgba(255,230,120,0.5);
    text-shadow: none;
  }

  /* lockout */
  .lockout-banner {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 14px; border-radius: 12px;
    background: rgba(227,76,76,0.18);
    border: 1px solid rgba(227,76,76,0.4);
    color: #ffc8c8;
    font-size: 12px; font-weight: 600; letter-spacing: 0.06em;
    margin-top: 14px;
    width: 100%; max-width: 310px;
    justify-content: center;
  }
  .lockout-banner .countdown {
    font-family: "Titan One"; font-size: 18px;
    color: var(--danger);
    text-shadow: 0 0 6px rgba(227,76,76,0.5);
    margin-left: 4px;
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="sky"></div>
    <div class="stars"></div>
    <div class="screen">
      <button class="back-btn">Back</button>

      <!-- Identity + dots on starfield (not inside panel) -->
      <div class="pin-identity">
        <div class="profile-bezel">
          <div class="bezel-ring"></div>
          <div class="bezel-plate">F</div>
        </div>
        <div class="pin-prompt-name">FINN</div>
        <div class="pin-prompt-label">enter your pin</div>
        <div class="pin-dots">
          <div class="pin-dot filled"><div class="pin-dot-ring"></div><div class="pin-dot-fill"></div></div>
          <div class="pin-dot filled"><div class="pin-dot-ring"></div><div class="pin-dot-fill"></div></div>
          <div class="pin-dot"><div class="pin-dot-ring"></div><div class="pin-dot-fill"></div></div>
          <div class="pin-dot"><div class="pin-dot-ring"></div><div class="pin-dot-fill"></div></div>
        </div>
      </div>

      <!-- Keypad only inside the framed panel -->
      <div class="keypad-panel">
        <div class="keypad">
          <button class="key">1</button>
          <button class="key">2</button>
          <button class="key">3</button>
          <button class="key">4</button>
          <button class="key">5</button>
          <button class="key">6</button>
          <button class="key">7</button>
          <button class="key">8</button>
          <button class="key">9</button>
          <button class="key ghost"></button>
          <button class="key">0</button>
          <button class="key backspace">⌫</button>
        </div>
      </div>

      <!-- Lockout variant -->
      <!--
      <div class="lockout-banner">
        Too many tries · wait <span class="countdown">4s</span>
      </div>
      -->
    </div>
  </div>
</body>
</html>
