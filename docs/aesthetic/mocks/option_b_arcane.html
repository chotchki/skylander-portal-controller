<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=390,initial-scale=1,viewport-fit=cover">
<title>Option B — Portal Arcane — Skylanders Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=Spectral:ital,wght@0,300;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --void-1: #0c0a1e;
    --void-2: #1a0e3a;
    --void-3: #05020f;
    --rune-gold: #f7d060;
    --rune-gold-dim: #9e7a1c;
    --ember: #ff6b9e;
    --ember-deep: #8a2a56;
    --violet: #7a4eff;
    --violet-deep: #2d0f6a;
    --cyan: #5fe4ff;
    --text: #f2e8ff;
    --ink: #15081f;
    --success: #7fffb4;
    --el-fire: radial-gradient(circle at 30% 25%, #ffb57a, #ff6b2a 40%, #b13310);
    --el-water: radial-gradient(circle at 30% 25%, #9fd6ff, #2aa6ff 40%, #0f4d8a);
    --el-life: radial-gradient(circle at 30% 25%, #a9f0ad, #5ac96b 40%, #26612e);
    --el-magic: radial-gradient(circle at 30% 25%, #ffa8fc, #da5ad6 40%, #651564);
    --el-undead: radial-gradient(circle at 30% 25%, #c4a8f2, #8a62c9 40%, #3b215f);
    --el-tech: radial-gradient(circle at 30% 25%, #ffd890, #ffb84d 40%, #a56500);
    --el-earth: radial-gradient(circle at 30% 25%, #d9b178, #a77b3a 40%, #5a3a13);
    --el-air: radial-gradient(circle at 30% 25%, #ffffff, #c6e6ff 40%, #7ea9cc);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Spectral", Georgia, serif;
    background: #050208;
    display: grid; place-items: center;
    min-height: 100vh; padding: 20px;
    color: var(--text);
  }
  .phone {
    width: 390px; height: 844px;
    border-radius: 52px;
    overflow: hidden; position: relative;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 12px #1a1a1a, 0 0 0 13px #333;
    background: var(--void-3);
  }
  @media (max-width: 450px) {
    body { padding: 0; background: var(--void-3); }
    .phone { width: 100vw; height: 100vh; border-radius: 0; box-shadow: none; }
  }

  .void {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 100% 60% at 50% 20%, var(--violet-deep) 0%, transparent 50%),
      radial-gradient(ellipse 80% 50% at 30% 80%, var(--ember-deep) 0%, transparent 50%),
      radial-gradient(ellipse 60% 40% at 80% 60%, rgba(122,78,255,0.4) 0%, transparent 50%),
      linear-gradient(180deg, var(--void-2) 0%, var(--void-1) 50%, var(--void-3) 100%);
  }
  .sparks {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1.5px 1.5px at 40px 80px, var(--cyan), transparent),
      radial-gradient(1px 1px at 100px 200px, var(--ember), transparent),
      radial-gradient(2px 2px at 200px 150px, var(--rune-gold), transparent),
      radial-gradient(1px 1px at 280px 300px, white, transparent),
      radial-gradient(1.5px 1.5px at 60px 400px, var(--violet), transparent),
      radial-gradient(1px 1px at 340px 500px, var(--cyan), transparent),
      radial-gradient(2px 2px at 160px 600px, var(--rune-gold), transparent),
      radial-gradient(1px 1px at 240px 720px, white, transparent);
    background-size: 400px 800px;
    animation: flicker 6s ease-in-out infinite alternate;
  }
  @keyframes flicker { 50% { opacity: 0.6; transform: scale(1.03); } }

  /* sigil ring behind content — rotating slowly */
  .sigil {
    position: absolute;
    top: 30%; left: 50%;
    width: 640px; height: 640px;
    transform: translate(-50%, -50%);
    background: conic-gradient(from 0deg,
      transparent 0deg, rgba(247,208,96,0.05) 20deg, transparent 50deg,
      transparent 180deg, rgba(122,78,255,0.08) 200deg, transparent 230deg,
      transparent 360deg);
    border-radius: 50%;
    animation: sigil-spin 60s linear infinite;
    pointer-events: none;
  }
  @keyframes sigil-spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

  .screen {
    position: relative; height: 100%;
    display: flex; flex-direction: column;
    padding: 44px 16px 24px;
    overflow-y: auto;
  }
  .screen::-webkit-scrollbar { display: none; }

  header.app-head {
    display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(247,208,96,0.18);
    position: relative;
  }
  header.app-head::before {
    content: "ᛉ ᛗ ᛋ ᛟ ᛉ";
    position: absolute; bottom: -7px; left: 50%;
    transform: translateX(-50%);
    background: var(--void-2);
    padding: 0 8px;
    font-family: "Uncial Antiqua";
    font-size: 10px;
    color: var(--rune-gold-dim);
    letter-spacing: 0.4em;
  }
  .profile-hex {
    width: 42px; height: 48px;
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    background: var(--el-magic);
    display: grid; place-items: center;
    font-family: "Uncial Antiqua";
    font-size: 22px;
    color: #fff;
    position: relative;
    filter: drop-shadow(0 0 8px rgba(218,90,214,0.5));
  }
  .profile-hex::after {
    content: "";
    position: absolute; inset: -2px;
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    background: linear-gradient(135deg, var(--rune-gold), var(--rune-gold-dim));
    z-index: -1;
  }
  .profile-name {
    font-family: "Uncial Antiqua";
    font-size: 18px; color: var(--rune-gold);
    letter-spacing: 0.05em;
    text-shadow: 0 0 12px rgba(247,208,96,0.5);
    line-height: 1;
  }
  .game-label {
    font-size: 10px;
    color: rgba(242,232,255,0.55);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    font-style: italic;
    font-weight: 500;
    margin-top: 3px;
  }
  .head-right { margin-left: auto; display: flex; gap: 6px; align-items: center; }
  .pip {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 10px var(--success);
    animation: breathe 2.2s ease-in-out infinite;
  }
  @keyframes breathe { 50% { opacity: 0.4; } }
  .rune-btn {
    width: 36px; height: 36px;
    background: transparent;
    border: 1px solid rgba(247,208,96,0.3);
    color: var(--rune-gold);
    font-family: "Uncial Antiqua";
    font-size: 16px;
    border-radius: 6px;
    cursor: pointer;
    display: grid; place-items: center;
  }
  .rune-btn.quit { color: var(--ember); border-color: rgba(255,107,158,0.35); }

  .title-wrap { text-align: center; margin: 4px 0 18px; position: relative; }
  .title {
    font-family: "Uncial Antiqua";
    font-size: 40px;
    color: var(--rune-gold);
    letter-spacing: 0.04em;
    text-shadow:
      0 0 20px rgba(247,208,96,0.6),
      0 0 40px rgba(247,208,96,0.3),
      0 2px 0 var(--void-3);
    line-height: 0.9;
  }
  .title-sub {
    font-family: "Spectral"; font-style: italic; font-weight: 300;
    font-size: 12px; letter-spacing: 0.3em;
    color: rgba(247,208,96,0.55);
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* Portal — hex bezel grid arranged in 2 rows of 4, offset honeycomb */
  .portal-ring {
    position: relative;
    padding: 12px 4px 18px;
  }
  .portal-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 18px 10px;
  }
  .slot {
    position: relative;
    aspect-ratio: 1 / 1.08;
  }
  .slot-hex {
    position: absolute; inset: 0;
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    background:
      linear-gradient(135deg, var(--rune-gold), var(--rune-gold-dim) 60%, #5a3f08);
    padding: 2px;
  }
  .slot-hex-inner {
    position: absolute; inset: 3px;
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    background: var(--el-fire);
    display: grid; place-items: center;
    color: #fff;
    font-family: "Uncial Antiqua";
    font-size: 22px;
    text-shadow: 0 2px 6px rgba(0,0,0,0.6);
  }
  .slot.empty .slot-hex {
    background: linear-gradient(135deg, rgba(247,208,96,0.3), rgba(158,122,28,0.25));
  }
  .slot.empty .slot-hex-inner {
    background:
      radial-gradient(circle at 50% 50%, rgba(122,78,255,0.2), rgba(12,10,30,0.8) 70%);
    color: rgba(247,208,96,0.55);
    font-size: 24px;
  }
  .slot.picking .slot-hex {
    background: linear-gradient(135deg, #fff7d0, var(--rune-gold) 40%, #fff7d0 100%);
    filter: drop-shadow(0 0 18px rgba(247,208,96,0.8)) drop-shadow(0 0 30px rgba(255,107,158,0.4));
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse { 50% { filter: drop-shadow(0 0 28px rgba(247,208,96,1)) drop-shadow(0 0 40px rgba(255,107,158,0.6)); } }
  .slot.picking .slot-hex-inner {
    background:
      conic-gradient(from 0deg, rgba(247,208,96,0.25), rgba(122,78,255,0.3), rgba(255,107,158,0.3), rgba(247,208,96,0.25));
    animation: inner-spin 5s linear infinite;
  }
  @keyframes inner-spin { to { transform: rotate(360deg); } }
  .slot.loading .slot-hex {
    background: linear-gradient(135deg, var(--cyan), var(--rune-gold), var(--ember), var(--cyan)) 0 0 / 200% 100%;
    animation: shimmer 1.2s linear infinite;
    filter: drop-shadow(0 0 14px rgba(95,228,255,0.5));
  }
  @keyframes shimmer { to { background-position: -200% 0; } }
  .slot.loading .slot-hex-inner { opacity: 0.55; }
  .slot.errored .slot-hex {
    background: linear-gradient(135deg, #ff9b9b, #e34c4c, #7a1818);
    filter: drop-shadow(0 0 14px rgba(227,76,76,0.6));
    animation: shudder 0.35s ease-in-out 3;
  }
  @keyframes shudder {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-2px); } 75% { transform: translateX(2px); }
  }
  .slot.idle .slot-hex-inner {
    animation: float-in 5s ease-in-out infinite;
  }
  @keyframes float-in { 50% { transform: translateY(-2px); } }
  .slot-index {
    position: absolute; top: -4px; left: 50%; transform: translateX(-50%);
    font-family: "Uncial Antiqua"; font-size: 11px;
    color: var(--rune-gold);
    background: var(--void-3);
    padding: 1px 6px;
    border: 1px solid var(--rune-gold-dim);
    z-index: 3;
    letter-spacing: 0.05em;
  }
  .slot-label {
    position: absolute;
    bottom: -14px; left: 50%; transform: translateX(-50%);
    font-size: 9px;
    color: var(--rune-gold);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 500;
    white-space: nowrap;
    text-shadow: 0 1px 0 var(--void-3), 0 0 6px rgba(0,0,0,0.8);
    z-index: 3;
  }
  .owner-spark {
    position: absolute;
    top: 6%; right: -6px;
    width: 14px; height: 14px;
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    background: var(--el-magic);
    filter: drop-shadow(0 0 6px currentColor);
    z-index: 3;
  }

  /* energy conduits between loaded slots — subtle SVG paths */
  .conduits {
    position: absolute; inset: 0;
    pointer-events: none;
    mix-blend-mode: screen;
    opacity: 0.4;
  }

  /* picking announce */
  .picking-announce {
    margin: 6px 2px 12px;
    text-align: center;
    font-family: "Uncial Antiqua";
    font-size: 13px;
    color: var(--rune-gold);
    letter-spacing: 0.12em;
    padding: 8px 6px;
    border-top: 1px solid rgba(247,208,96,0.2);
    border-bottom: 1px solid rgba(247,208,96,0.2);
    position: relative;
    background: linear-gradient(180deg, transparent, rgba(247,208,96,0.07), transparent);
  }
  .picking-announce::before, .picking-announce::after {
    content: "ᛟ"; color: var(--ember); margin: 0 10px;
  }

  /* Browse strip */
  .browse-card {
    margin: 24px 2px 0;
    padding: 12px 14px 14px;
    border-radius: 3px;
    position: relative;
    background: linear-gradient(180deg, rgba(26,14,58,0.85), rgba(12,10,30,0.95));
    border: 1px solid rgba(247,208,96,0.25);
  }
  .browse-card::before, .browse-card::after {
    content: "";
    position: absolute;
    width: 10px; height: 10px;
    border: 1px solid var(--rune-gold);
  }
  .browse-card::before { top: -4px; left: -4px; border-right: 0; border-bottom: 0; }
  .browse-card::after { bottom: -4px; right: -4px; border-left: 0; border-top: 0; }
  .browse-card h3 {
    font-family: "Uncial Antiqua";
    font-size: 13px;
    color: var(--rune-gold);
    letter-spacing: 0.12em;
    margin-bottom: 10px;
    text-align: center;
  }
  .mini-row { display: flex; gap: 8px; overflow-x: auto; padding: 2px; margin-bottom: 12px; }
  .mini-row::-webkit-scrollbar { display: none; }
  .mini { flex: 0 0 50px; aspect-ratio: 1 / 1.08; position: relative; }
  .mini .slot-hex { padding: 1.5px; }
  .mini .slot-hex-inner { inset: 2px; font-size: 14px; }
  .invoke-btn {
    width: 100%;
    padding: 12px;
    font-family: "Uncial Antiqua";
    font-size: 14px;
    letter-spacing: 0.18em;
    color: var(--rune-gold);
    background: linear-gradient(180deg, rgba(122,78,255,0.2), rgba(45,15,106,0.5));
    border: 1px solid var(--rune-gold);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
    text-shadow: 0 0 10px rgba(247,208,96,0.6);
    transition: all 0.2s;
  }
  .invoke-btn:hover {
    background: linear-gradient(180deg, rgba(122,78,255,0.4), rgba(45,15,106,0.7));
    box-shadow: 0 0 20px rgba(247,208,96,0.4), inset 0 0 20px rgba(247,208,96,0.1);
  }
  .invoke-btn::before, .invoke-btn::after { content: "◈"; margin: 0 10px; color: var(--ember); }

  .el-fire .slot-hex-inner, .el-fire.mini .slot-hex-inner { background: var(--el-fire); }
  .el-water .slot-hex-inner, .el-water.mini .slot-hex-inner { background: var(--el-water); }
  .el-life .slot-hex-inner, .el-life.mini .slot-hex-inner { background: var(--el-life); }
  .el-magic .slot-hex-inner, .el-magic.mini .slot-hex-inner { background: var(--el-magic); }
  .el-undead .slot-hex-inner, .el-undead.mini .slot-hex-inner { background: var(--el-undead); }
  .el-tech .slot-hex-inner, .el-tech.mini .slot-hex-inner { background: var(--el-tech); }
  .el-earth .slot-hex-inner, .el-earth.mini .slot-hex-inner { background: var(--el-earth); }
  .el-air .slot-hex-inner, .el-air.mini .slot-hex-inner { background: var(--el-air); color: var(--ink); text-shadow: 0 1px 2px rgba(255,255,255,0.6); }

  .tagline {
    position: absolute; bottom: 16px; left: 0; right: 0;
    text-align: center;
    font-family: "Uncial Antiqua";
    font-size: 9px; letter-spacing: 0.28em;
    color: rgba(247,208,96,0.3);
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="void"></div>
    <div class="sparks"></div>
    <div class="sigil"></div>
    <div class="screen">
      <header class="app-head">
        <div class="profile-hex">F</div>
        <div style="margin-left: 4px;">
          <div class="profile-name">Finn</div>
          <div class="game-label">Trap Team</div>
        </div>
        <div class="head-right">
          <span class="pip"></span>
          <button class="rune-btn" title="Show join code">ᛉ</button>
          <button class="rune-btn quit" title="Quit">✕</button>
        </div>
      </header>

      <div class="title-wrap">
        <h1 class="title">The Portal</h1>
        <div class="title-sub">summon thy heroes</div>
      </div>

      <div class="picking-announce">picking for slot iii</div>

      <div class="portal-ring">
        <div class="portal-grid">
          <div class="slot el-fire idle">
            <div class="slot-index">I</div>
            <div class="owner-spark" style="background: var(--el-magic);"></div>
            <div class="slot-hex"><div class="slot-hex-inner">E</div></div>
            <div class="slot-label">Eruptor</div>
          </div>
          <div class="slot el-water loading">
            <div class="slot-index">II</div>
            <div class="slot-hex"><div class="slot-hex-inner">G</div></div>
            <div class="slot-label">loading</div>
          </div>
          <div class="slot empty picking">
            <div class="slot-index">III</div>
            <div class="slot-hex"><div class="slot-hex-inner">+</div></div>
            <div class="slot-label">pick one</div>
          </div>
          <div class="slot empty">
            <div class="slot-index">IV</div>
            <div class="slot-hex"><div class="slot-hex-inner">+</div></div>
          </div>
          <div class="slot el-magic idle">
            <div class="slot-index">V</div>
            <div class="owner-spark" style="background: var(--el-magic);"></div>
            <div class="slot-hex"><div class="slot-hex-inner">S</div></div>
            <div class="slot-label">Spyro</div>
          </div>
          <div class="slot el-life idle">
            <div class="slot-index">VI</div>
            <div class="owner-spark" style="background: var(--el-fire);"></div>
            <div class="slot-hex"><div class="slot-hex-inner">S</div></div>
            <div class="slot-label">Stealth Elf</div>
          </div>
          <div class="slot empty">
            <div class="slot-index">VII</div>
            <div class="slot-hex"><div class="slot-hex-inner">+</div></div>
          </div>
          <div class="slot errored">
            <div class="slot-index">VIII</div>
            <div class="slot-hex"><div class="slot-hex-inner">!</div></div>
            <div class="slot-label">banished</div>
          </div>
        </div>
      </div>

      <div class="browse-card">
        <h3>recently summoned</h3>
        <div class="mini-row">
          <div class="mini el-fire"><div class="slot-hex"><div class="slot-hex-inner">E</div></div></div>
          <div class="mini el-water"><div class="slot-hex"><div class="slot-hex-inner">W</div></div></div>
          <div class="mini el-tech"><div class="slot-hex"><div class="slot-hex-inner">T</div></div></div>
          <div class="mini el-earth"><div class="slot-hex"><div class="slot-hex-inner">B</div></div></div>
          <div class="mini el-undead"><div class="slot-hex"><div class="slot-hex-inner">C</div></div></div>
          <div class="mini el-air"><div class="slot-hex"><div class="slot-hex-inner">J</div></div></div>
          <div class="mini el-magic"><div class="slot-hex"><div class="slot-hex-inner">W</div></div></div>
          <div class="mini el-life"><div class="slot-hex"><div class="slot-hex-inner">F</div></div></div>
        </div>
        <button class="invoke-btn">invoke the grimoire · 504</button>
      </div>

      <div class="tagline">ᛉ wiki lore cc by-sa ᛉ</div>
    </div>
  </div>
</body>
</html>
