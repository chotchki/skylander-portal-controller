<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=390,initial-scale=1,viewport-fit=cover">
<title>Resume Last Setup — Heraldic — Skylanders Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Titan+One&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,800;1,9..144,400&display=swap" rel="stylesheet">
<style>
  :root {
    --sf-1: #0b1e52; --sf-2: #061436; --sf-3: #020818;
    --gb: #ffe58a; --g: #f5c634; --gm: #c58c18; --gs: #6e4a00; --gi: #3a2500;
    --text: #f7f7fb; --ink: #1a1203;
    --el-magic: linear-gradient(135deg, #da5ad6, #651564);
    --el-fire: linear-gradient(135deg, #ff6b2a, #b13310);
    --el-water: linear-gradient(135deg, #2aa6ff, #0f4d8a);
    --el-life: linear-gradient(135deg, #5ac96b, #26612e);
    --el-tech: linear-gradient(135deg, #ffb84d, #a56500);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Fraunces", Georgia, serif;
    background: #0a0a0a;
    display: grid; place-items: center;
    min-height: 100vh; padding: 20px;
    color: var(--text);
  }
  .phone {
    width: 390px; height: 844px;
    border-radius: 52px; overflow: hidden; position: relative;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 12px #1a1a1a, 0 0 0 13px #333;
    background: var(--sf-3);
  }
  @media (max-width: 450px) {
    body { padding: 0; background: var(--sf-3); }
    .phone { width: 100vw; height: 100vh; border-radius: 0; box-shadow: none; }
  }

  .sky {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 120% 60% at 50% 0%, #1a3a8a 0%, transparent 50%),
      radial-gradient(ellipse 80% 50% at 50% 100%, #0e2464 0%, transparent 50%),
      linear-gradient(180deg, var(--sf-1), var(--sf-2) 60%, var(--sf-3));
  }
  .stars {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 20px 30px, white, transparent),
      radial-gradient(1px 1px at 40px 70px, rgba(255,255,255,0.7), transparent),
      radial-gradient(2px 2px at 50px 160px, rgba(255,230,180,0.9), transparent),
      radial-gradient(1px 1px at 130px 40px, white, transparent),
      radial-gradient(1px 1px at 90px 250px, rgba(255,255,255,0.8), transparent),
      radial-gradient(1px 1px at 170px 300px, white, transparent),
      radial-gradient(2px 2px at 230px 100px, rgba(180,220,255,0.9), transparent),
      radial-gradient(1px 1px at 300px 200px, white, transparent),
      radial-gradient(1px 1px at 260px 400px, white, transparent),
      radial-gradient(2px 2px at 320px 620px, rgba(255,230,180,0.8), transparent),
      radial-gradient(1px 1px at 80px 720px, white, transparent);
    background-size: 400px 800px;
  }

  /* ===== UNDERLAY: faded empty portal waiting for figures ===== */
  .underlay {
    position: absolute; inset: 0;
    filter: blur(2px);
    opacity: 0.35;
    pointer-events: none;
  }
  .u-head {
    display: flex; align-items: center; gap: 10px;
    padding: 44px 18px 10px;
    height: 88px;
  }
  .u-swatch {
    width: 46px; height: 46px; border-radius: 50%;
    background: radial-gradient(circle at 30% 25%, var(--gb), var(--g) 22%, var(--gm) 55%, var(--gs) 100%);
    box-shadow: inset 0 0 0 2px var(--gi), 0 2px 6px rgba(0,0,0,0.6);
    display: grid; place-items: center;
    font-family: "Titan One"; font-size: 22px; color: #fff;
  }
  .u-swatch .plate {
    width: 80%; height: 80%; border-radius: 50%;
    background: linear-gradient(135deg, #9b5cff, #4a1e8a);
    display: grid; place-items: center;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.5);
  }
  .u-name {
    font-family: "Titan One"; font-size: 16px; color: var(--gb);
    -webkit-text-stroke: 0.75px var(--gi);
    text-shadow: 0 1px 0 var(--gs), 0 2px 0 var(--gi);
  }
  .u-game {
    font-family: "Fraunces"; font-style: italic; font-size: 11px;
    color: rgba(247,247,251,0.7);
  }
  .u-pip {
    margin-left: auto; width: 10px; height: 10px; border-radius: 50%;
    background: #65d68c; box-shadow: 0 0 8px rgba(101,214,140,0.7);
  }
  .u-portal {
    padding: 20px 28px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 18px 22px;
  }
  .u-slot {
    aspect-ratio: 1; border-radius: 50%;
    background: radial-gradient(circle at 30% 25%, rgba(245,198,52,0.2), rgba(110,74,0,0.25) 55%, rgba(0,0,0,0.35) 100%);
    box-shadow: inset 0 0 0 2px rgba(58,37,0,0.6);
    display: grid; place-items: center;
    font-family: "Titan One"; font-size: 36px;
    color: rgba(245,198,52,0.3);
  }

  /* ===== SCRIM + MODAL PANEL ===== */
  .scrim {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 100% 70% at 50% 50%, rgba(0,0,0,0.55), rgba(0,0,0,0.8) 100%);
    animation: scrim-in 300ms ease-out both;
  }
  @keyframes scrim-in { from { opacity: 0; } to { opacity: 1; } }

  .panel-wrap {
    position: absolute; inset: 0;
    display: grid; place-items: center;
    padding: 32px 24px;
  }
  .panel {
    position: relative;
    width: 100%; max-width: 340px;
    padding: 28px 24px 22px;
    border-radius: 22px;
    background:
      radial-gradient(ellipse 120% 80% at 50% 0%, rgba(255,230,120,0.10), transparent 60%),
      linear-gradient(180deg, rgba(26,58,138,0.94), rgba(10,36,100,0.96) 50%, rgba(6,20,54,0.98));
    animation: panel-in 400ms cubic-bezier(.3,1.3,.5,1) both;
  }
  .panel::before {
    content: ""; position: absolute; inset: -2px;
    border-radius: 24px; z-index: -1;
    background: linear-gradient(135deg,
      var(--gb) 0%, var(--gm) 30%, var(--gb) 50%, var(--gm) 70%, var(--gb) 100%);
  }
  @keyframes panel-in {
    from { opacity: 0; transform: scale(0.92) translateY(10px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .heading {
    font-family: "Titan One";
    font-size: 30px; letter-spacing: 0.06em;
    text-align: center;
    color: var(--gb);
    -webkit-text-stroke: 1px var(--gi);
    text-shadow:
      0 2px 0 var(--gs),
      0 3px 0 var(--gi),
      0 5px 10px rgba(0,0,0,0.5),
      0 0 24px rgba(245,198,52,0.3);
    margin-bottom: 4px;
  }
  .sub {
    text-align: center;
    font-family: "Fraunces"; font-style: italic; font-weight: 600; font-size: 15px;
    color: #fff4e0;
    letter-spacing: 0.08em;
    text-shadow: 0 1px 0 rgba(0,0,0,0.55), 0 0 12px rgba(255,230,120,0.2);
    margin-bottom: 14px;
  }
  .context {
    text-align: center;
    font-family: "Titan One"; font-size: 12px; letter-spacing: 0.2em;
    color: var(--g);
    text-shadow: 0 1px 0 rgba(0,0,0,0.5);
    margin-bottom: 16px;
  }

  /* ===== FIGURE ROW ===== */
  .fig-row {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
    margin: 4px 0 16px;
    padding: 14px 10px 12px;
    border-radius: 14px;
    background: linear-gradient(180deg, rgba(8,20,54,0.6), rgba(4,12,36,0.7));
    box-shadow: inset 0 0 0 1px rgba(255,230,120,0.15), inset 0 2px 4px rgba(0,0,0,0.4);
    animation: row-in 600ms cubic-bezier(.3,1.3,.5,1) 200ms both;
  }
  @keyframes row-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .fig {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .bezel {
    width: 58px; height: 58px; border-radius: 50%;
    background: radial-gradient(circle at 30% 25%, var(--gb), var(--g) 22%, var(--gm) 55%, var(--gs) 100%);
    box-shadow:
      inset 0 0 0 2px var(--gi),
      inset 0 3px 4px rgba(255,255,255,0.3),
      inset 0 -3px 4px rgba(0,0,0,0.5),
      0 0 0 1px #000,
      0 3px 8px rgba(0,0,0,0.5);
    display: grid; place-items: center;
  }
  .plate {
    width: 80%; height: 80%; border-radius: 50%;
    display: grid; place-items: center;
    box-shadow:
      inset 0 0 0 1px rgba(0,0,0,0.6),
      inset 0 3px 6px rgba(255,255,255,0.25),
      inset 0 -4px 8px rgba(0,0,0,0.5);
    font-family: "Titan One"; font-size: 18px; color: #fff;
    text-shadow: 0 1px 0 rgba(0,0,0,0.5);
  }
  .plate.magic  { background: var(--el-magic); }
  .plate.fire   { background: var(--el-fire); }
  .plate.water  { background: var(--el-water); }
  .plate.life   { background: var(--el-life); }
  .plate.tech   { background: var(--el-tech); }
  .fig-name {
    font-family: "Fraunces"; font-style: italic; font-weight: 600; font-size: 11px;
    color: #e8e4d8; text-align: center;
    max-width: 74px;
  }

  .when {
    text-align: center;
    font-family: "Fraunces"; font-style: italic; font-size: 12px;
    color: #d9c88a;
    letter-spacing: 0.08em;
    margin-bottom: 20px;
  }

  /* ===== BUTTONS ===== */
  .actions { display: flex; flex-direction: column; gap: 10px; }
  .btn {
    width: 100%; padding: 14px;
    font-family: "Titan One"; font-size: 16px;
    letter-spacing: 0.22em; text-align: center;
    border: none; border-radius: 14px; cursor: pointer;
    position: relative;
  }
  .btn-primary {
    color: var(--ink);
    background: linear-gradient(180deg, var(--gb) 0%, var(--g) 45%, var(--gm) 100%);
    border: 2px solid var(--gi);
    text-shadow: 0 1px 0 rgba(255,255,255,0.4);
    box-shadow:
      inset 0 2px 0 rgba(255,255,255,0.45),
      inset 0 -2px 0 rgba(0,0,0,0.25),
      0 4px 0 var(--gs),
      0 6px 14px rgba(0,0,0,0.45),
      0 0 20px rgba(245,198,52,0.25);
  }
  .btn-primary:active { transform: translateY(3px); box-shadow: inset 0 2px 0 rgba(255,255,255,0.45), 0 1px 0 var(--gs); }
  .btn-secondary {
    color: #fff;
    background: linear-gradient(180deg, #2f6edc 0%, #1e4fb3 55%, #153a8a 100%);
    border: 2px solid var(--gb);
    text-shadow: 0 1px 0 rgba(0,0,0,0.5);
    box-shadow:
      inset 0 2px 0 rgba(255,255,255,0.25),
      inset 0 -2px 0 rgba(0,0,0,0.25),
      0 4px 0 rgba(0,0,0,0.45),
      0 5px 12px rgba(0,0,0,0.4);
  }
  .btn-secondary:active { transform: translateY(3px); box-shadow: inset 0 2px 0 rgba(255,255,255,0.25), 0 1px 0 rgba(0,0,0,0.45); }
</style>
</head>
<body>
  <div class="phone">
    <div class="sky"></div>
    <div class="stars"></div>

    <div class="underlay">
      <div class="u-head">
        <div class="u-swatch"><div class="plate"></div></div>
        <div>
          <div class="u-name">AVA</div>
          <div class="u-game">Swap Force</div>
        </div>
        <div class="u-pip"></div>
      </div>
      <div class="u-portal">
        <div class="u-slot">+</div><div class="u-slot">+</div>
        <div class="u-slot">+</div><div class="u-slot">+</div>
        <div class="u-slot">+</div><div class="u-slot">+</div>
      </div>
    </div>

    <div class="scrim"></div>

    <div class="panel-wrap">
      <div class="panel">
        <div class="heading">WELCOME BACK</div>
        <div class="sub">pick up where you left off?</div>
        <div class="context">— YOUR LAST ADVENTURE —</div>

        <div class="fig-row">
          <div class="fig">
            <div class="bezel"><div class="plate magic">S</div></div>
            <div class="fig-name">Spyro</div>
          </div>
          <div class="fig">
            <div class="bezel"><div class="plate fire">E</div></div>
            <div class="fig-name">Eruptor</div>
          </div>
          <div class="fig">
            <div class="bezel"><div class="plate life">S</div></div>
            <div class="fig-name">Stealth Elf</div>
          </div>
          <div class="fig">
            <div class="bezel"><div class="plate tech">T</div></div>
            <div class="fig-name">Trigger Happy</div>
          </div>
        </div>

        <div class="when">saved 3 days ago</div>

        <div class="actions">
          <button class="btn btn-primary">RESUME</button>
          <button class="btn btn-secondary">START FRESH</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
