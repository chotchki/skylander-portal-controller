<title>Kaos Takeover — Heraldic — Skylanders Portal</title>

<style>
  :root {
    /* Kaos palette */
    --k-void-1: #1a0a40;
    --k-void-2: #120628;
    --k-void-3: #070212;
    --k-violet: #7a4eff;
    --k-violet-deep: #2d0f6a;
    --k-ember: #ff6b9e;
    --k-ember-deep: #8a2a56;
    --k-magenta: #da28a8;
    --k-magenta-bright: #ff4fd0;
    --k-lime: #b8ff3a;
    --text: #f7e8ff;
    --ink: #1a0030;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Fraunces", Georgia, serif;
    background: #050208;
    display: grid; place-items: center;
    min-height: 100vh; padding: 20px;
    color: var(--text);
  }
  .phone {
    width: 390px; height: 844px;
    border-radius: 52px; overflow: hidden; position: relative;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 12px #1a1a1a, 0 0 0 13px #333;
    background: var(--k-void-3);
  }
  @media (max-width: 450px) {
    body { padding: 0; background: var(--k-void-3); }
    .phone { width: 100vw; height: 100vh; border-radius: 0; box-shadow: none; }
  }

  /* ========== KAOS VOID BACKGROUND ========== */
  .void {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 30%, var(--k-violet-deep) 0%, transparent 55%),
      radial-gradient(ellipse 60% 50% at 30% 80%, var(--k-ember-deep) 0%, transparent 55%),
      radial-gradient(ellipse 70% 50% at 80% 60%, rgba(122,78,255,0.4) 0%, transparent 55%),
      linear-gradient(180deg, var(--k-void-1) 0%, var(--k-void-2) 50%, var(--k-void-3) 100%);
  }
  /* hex-tile grid (kaos lair floor reference) */
  .hexgrid {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 30px 35px, rgba(218,40,168,0.18) 2px, transparent 3px),
      radial-gradient(circle at 90px 35px, rgba(218,40,168,0.14) 2px, transparent 3px),
      radial-gradient(circle at 60px 87px, rgba(218,40,168,0.18) 2px, transparent 3px),
      radial-gradient(circle at 120px 87px, rgba(218,40,168,0.14) 2px, transparent 3px),
      radial-gradient(circle at 30px 139px, rgba(255,107,158,0.18) 2px, transparent 3px);
    background-size: 120px 104px;
    opacity: 0.9;
    animation: hex-pulse 4s ease-in-out infinite;
  }
  @keyframes hex-pulse { 50% { opacity: 0.5; } }
  /* crackling magenta particles */
  .sparks {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(2px 2px at 50px 120px, var(--k-magenta-bright), transparent),
      radial-gradient(1.5px 1.5px at 200px 80px, var(--k-ember), transparent),
      radial-gradient(2px 2px at 320px 240px, var(--k-violet), transparent),
      radial-gradient(1px 1px at 100px 400px, var(--k-magenta-bright), transparent),
      radial-gradient(2px 2px at 280px 500px, var(--k-ember), transparent),
      radial-gradient(1.5px 1.5px at 60px 640px, var(--k-violet), transparent),
      radial-gradient(1px 1px at 340px 720px, var(--k-magenta-bright), transparent);
    background-size: 400px 800px;
    animation: sparks-flicker 5s ease-in-out infinite alternate;
  }
  @keyframes sparks-flicker { 50% { opacity: 0.5; transform: scale(1.05); } }
  /* edge vignette + lightning scar */
  .vignette {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 100% 80% at 50% 50%, transparent 50%, rgba(0,0,0,0.7) 100%),
      linear-gradient(135deg, transparent 45%, rgba(218,40,168,0.08) 50%, transparent 55%);
    pointer-events: none;
  }

  .viewport {
    position: relative; height: 100%;
    display: flex; flex-direction: column;
    padding: 60px 28px 32px;
    align-items: center; justify-content: center;
    gap: 22px;
  }

  /* ========== KAOS SIGIL — the Kaos head symbol, mask-tinted in Kaos palette ========== */

    width: 128px; height: 128px;
    position: relative;
    filter:
      drop-shadow(0 0 20px var(--k-magenta))
      drop-shadow(0 0 40px var(--k-ember))
      drop-shadow(0 0 60px rgba(255,107,158,0.5));
    animation: sigil-pulse 2.2s ease-in-out infinite;
  }

  @keyframes sigil-pulse {
    0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px var(--k-magenta)) drop-shadow(0 0 40px var(--k-ember)) drop-shadow(0 0 60px rgba(255,107,158,0.5)); }
    50% { transform: scale(1.05); filter: drop-shadow(0 0 30px var(--k-magenta-bright)) drop-shadow(0 0 60px var(--k-ember)) drop-shadow(0 0 90px rgba(255,107,158,0.7)); }
  }

  /* ========== DISTORTED TITLE (kaos display treatment) ========== */
  .kaos-title {
    font-family: "Titan One";
    font-size: 42px;
    letter-spacing: 0.06em;
    color: var(--k-magenta-bright);
    -webkit-text-stroke: 1.5px var(--k-violet-deep);
    text-align: center;
    line-height: 0.95;
    text-shadow:
      0 2px 0 var(--k-ember-deep),
      0 3px 0 var(--k-void-3),
      0 0 24px var(--k-magenta),
      0 0 48px rgba(255,107,158,0.5);
    position: relative;
    animation: title-glitch 3.5s ease-in-out infinite;
  }
  @keyframes title-glitch {
    0%, 90%, 100% { transform: translateX(0); }
    92% { transform: translateX(-2px) skewX(-1deg); }
    94% { transform: translateX(2px) skewX(1deg); }
    96% { transform: translateX(-1px); }
  }
  .kaos-title .line2 {
    display: block; margin-top: 4px;
    font-size: 54px;
  }

  /* ========== KAOS QUOTE CARD ========== */
  .quote-card {
    width: 100%; max-width: 320px;
    padding: 18px 20px;
    border-radius: 16px;
    background:
      radial-gradient(ellipse 120% 80% at 50% 0%, rgba(255,107,158,0.15), transparent 60%),
      linear-gradient(180deg, rgba(45,15,106,0.9), rgba(26,10,64,0.95));
    border: 2px solid transparent;
    background-clip: padding-box;
    position: relative;
    animation: quote-in 0.6s cubic-bezier(.3,1.3,.5,1) both;
    animation-delay: 0.2s;
    opacity: 0;
  }
  .quote-card::before {
    content: ""; position: absolute; inset: -2px;
    border-radius: 18px;
    background: linear-gradient(135deg,
      var(--k-ember) 0%,
      var(--k-magenta) 30%,
      var(--k-violet) 60%,
      var(--k-magenta-bright) 100%);
    z-index: -1;
  }
  @keyframes quote-in {
    from { opacity: 0; transform: scale(0.9) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .quote-open, .quote-close {
    font-family: "Titan One"; font-size: 36px;
    color: #ffd6d6;
    line-height: 0.6;
  }
  .quote-open { text-align: left; margin-bottom: -8px; }
  .quote-close { text-align: right; margin-top: -4px; }
  .quote-body {
    font-family: "Fraunces"; font-style: italic;
    font-size: 17px; line-height: 1.4;
    color: #ffd9ee;
    text-align: center;
    text-shadow: 0 1px 0 rgba(0,0,0,0.6), 0 0 10px rgba(218,40,168,0.3);
    padding: 0 4px;
  }
  .quote-attrib {
    font-family: "Titan One";
    font-size: 11px; letter-spacing: 0.3em;
    color: var(--k-ember);
    text-align: right;
    margin-top: 10px;
    text-shadow: 0 1px 0 var(--k-void-3), 0 0 8px var(--k-magenta);
  }

  /* ========== INFO LINE (who took it) ========== */
  .takeover-info {
    font-family: "Fraunces"; font-style: italic; font-weight: 600;
    font-size: 13px;
    color: #f3e8e4;
    text-align: center;
    letter-spacing: 0.08em;
    text-shadow: 0 1px 0 rgba(0,0,0,0.6);
  }

  /* ========== KICK BACK BUTTON (ember Kaos button) ========== */
  .kick-btn {
    width: 100%; max-width: 320px;
    padding: 16px;
    font-family: "Titan One";
    font-size: 16px;
    letter-spacing: 0.22em;
    color: #fff;
    background: linear-gradient(180deg, var(--k-magenta-bright) 0%, var(--k-magenta) 40%, var(--k-ember-deep) 100%);
    border: 2px solid var(--k-ember);
    border-radius: 14px;
    cursor: pointer;
    position: relative;
    text-shadow: 0 1px 0 var(--k-void-3), 0 0 12px rgba(255,255,255,0.6);
    box-shadow:
      inset 0 2px 0 rgba(255,255,255,0.35),
      inset 0 -2px 0 rgba(0,0,0,0.3),
      0 4px 0 var(--k-ember-deep),
      0 8px 20px rgba(218,40,168,0.4),
      0 0 30px rgba(255,107,158,0.3);
    animation: kick-pulse 2.5s ease-in-out infinite;
  }
  @keyframes kick-pulse {
    50% { box-shadow:
      inset 0 2px 0 rgba(255,255,255,0.4),
      inset 0 -2px 0 rgba(0,0,0,0.3),
      0 4px 0 var(--k-ember-deep),
      0 8px 24px rgba(218,40,168,0.6),
      0 0 40px rgba(255,107,158,0.5); }
  }
  .kick-btn:active {
    transform: translateY(3px);
    box-shadow:
      inset 0 2px 0 rgba(255,255,255,0.35),
      0 1px 0 var(--k-ember-deep),
      0 4px 12px rgba(218,40,168,0.4);
  }

  .kick-sub {
    font-family: "Fraunces"; font-style: italic; font-weight: 600;
    font-size: 11px;
    color: #ffd6d6;
    text-align: center;
    letter-spacing: 0.1em;
    margin-top: -8px;
    text-shadow: 0 1px 0 rgba(0,0,0,0.6);
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="void"></div>
    <div class="hexgrid"></div>
    <div class="sparks"></div>

    <div class="viewport">
      <div class="kaos-sigil"></div>

      <h1 class="kaos-title">
        KAOS
        <span class="line2">REIGNS!</span>
      </h1>

      <div class="quote-card">
        <div class="quote-open">"</div>
        <div class="quote-body">
          Behold my magnificent wickedness!
          Your petty portal belongs to ME now, fool.
          Crawl away in shame, or return and TREMBLE before my genius!
        </div>
        <div class="quote-close">"</div>
        <div class="quote-attrib">— KAOS</div>
      </div>

      <div class="takeover-info">
        your seat has been claimed · enter your pin to return
      </div>

      <button class="kick-btn">KICK BACK IN</button>
      <div class="kick-sub">cooldown: ready</div>
    </div>

    <div class="vignette"></div>
  </div>
</body>
</html>
