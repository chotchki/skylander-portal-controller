<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=390,initial-scale=1,viewport-fit=cover">
<title>Reset Figure Confirm — Heraldic — Skylanders Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Titan+One&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,800;1,9..144,400&display=swap" rel="stylesheet">
<style>
  :root {
    --sf-1: #0b1e52; --sf-2: #061436; --sf-3: #020818;
    --gb: #ffe58a; --g: #f5c634; --gm: #c58c18; --gs: #6e4a00; --gi: #3a2500;
    --text: #f7f7fb; --ink: #1a1203;
    --danger-b: #ffc0c0;
    --danger-1: #c23a3a;
    --danger-2: #9a2424;
    --danger-3: #6e1414;
    --el-magic: linear-gradient(135deg, #da5ad6, #651564);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Fraunces", Georgia, serif;
    background: #0a0a0a;
    display: grid; place-items: center;
    min-height: 100vh; padding: 20px;
    color: var(--text);
  }
  .phone {
    width: 390px; height: 844px;
    border-radius: 52px; overflow: hidden; position: relative;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 12px #1a1a1a, 0 0 0 13px #333;
    background: var(--sf-3);
  }
  @media (max-width: 450px) {
    body { padding: 0; background: var(--sf-3); }
    .phone { width: 100vw; height: 100vh; border-radius: 0; box-shadow: none; }
  }

  .sky {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 120% 60% at 50% 0%, #1a3a8a 0%, transparent 50%),
      radial-gradient(ellipse 80% 50% at 50% 100%, #0e2464 0%, transparent 50%),
      linear-gradient(180deg, var(--sf-1), var(--sf-2) 60%, var(--sf-3));
  }
  .stars {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 20px 30px, white, transparent),
      radial-gradient(1px 1px at 40px 70px, rgba(255,255,255,0.7), transparent),
      radial-gradient(2px 2px at 50px 160px, rgba(255,230,180,0.9), transparent),
      radial-gradient(1px 1px at 130px 40px, white, transparent),
      radial-gradient(1px 1px at 90px 250px, rgba(255,255,255,0.8), transparent),
      radial-gradient(2px 2px at 230px 100px, rgba(180,220,255,0.9), transparent),
      radial-gradient(1px 1px at 300px 200px, white, transparent),
      radial-gradient(2px 2px at 320px 620px, rgba(255,230,180,0.8), transparent);
    background-size: 400px 800px;
  }

  /* ===== UNDERLAY: faded figure detail view (where reset is initiated) ===== */
  .underlay {
    position: absolute; inset: 0;
    filter: blur(3px);
    opacity: 0.3;
    pointer-events: none;
  }
  .u-panel {
    position: absolute; inset: 120px 28px 120px;
    border-radius: 24px;
    background: linear-gradient(180deg, rgba(26,58,138,0.92), rgba(10,36,100,0.95) 50%, rgba(6,20,54,0.96));
    border: 2px solid var(--gb);
  }
  .u-hero {
    position: absolute; left: 50%; top: 80px;
    transform: translateX(-50%);
    width: 140px; height: 140px; border-radius: 50%;
    background: radial-gradient(circle at 30% 25%, var(--gb), var(--g) 22%, var(--gm) 55%, var(--gs) 100%);
    box-shadow: inset 0 0 0 3px var(--gi);
  }
  .u-hero .p {
    position: absolute; inset: 10%; border-radius: 50%;
    background: var(--el-magic);
  }

  /* ===== SCRIM + MODAL PANEL ===== */
  .scrim {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 100% 70% at 50% 50%, rgba(40,0,0,0.55), rgba(0,0,0,0.82) 100%);
    animation: scrim-in 300ms ease-out both;
  }
  @keyframes scrim-in { from { opacity: 0; } to { opacity: 1; } }

  .panel-wrap {
    position: absolute; inset: 0;
    display: grid; place-items: center;
    padding: 32px 24px;
  }
  .panel {
    position: relative;
    width: 100%; max-width: 320px;
    padding: 24px 22px 20px;
    border-radius: 22px;
    background:
      radial-gradient(ellipse 120% 80% at 50% 0%, rgba(226,76,76,0.12), transparent 60%),
      linear-gradient(180deg, rgba(40,18,30,0.96), rgba(26,10,14,0.96) 50%, rgba(14,6,10,0.98));
    animation: panel-in 400ms cubic-bezier(.3,1.3,.5,1) both;
  }
  .panel::before {
    content: ""; position: absolute; inset: -2px;
    border-radius: 24px; z-index: -1;
    background: linear-gradient(135deg,
      var(--danger-b) 0%, var(--danger-1) 30%, var(--gb) 50%, var(--danger-1) 70%, var(--danger-b) 100%);
  }
  @keyframes panel-in {
    from { opacity: 0; transform: scale(0.92) translateY(10px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .heading {
    font-family: "Titan One";
    font-size: 26px; letter-spacing: 0.06em;
    text-align: center;
    color: var(--gb);
    -webkit-text-stroke: 1px var(--gi);
    text-shadow:
      0 2px 0 var(--gs),
      0 3px 0 var(--gi),
      0 5px 10px rgba(0,0,0,0.5),
      0 0 22px rgba(226,76,76,0.35);
    margin-bottom: 6px;
  }

  .warning-mark {
    text-align: center;
    font-family: "Titan One"; font-size: 11px; letter-spacing: 0.3em;
    color: var(--danger-b);
    text-shadow: 0 1px 0 rgba(0,0,0,0.6), 0 0 10px rgba(226,76,76,0.6);
    margin-bottom: 14px;
  }

  /* ===== TARGET FIGURE ===== */
  .target {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    margin: 2px 0 14px;
  }
  .hero-bezel {
    width: 110px; height: 110px; border-radius: 50%;
    background: radial-gradient(circle at 30% 25%, var(--gb), var(--g) 22%, var(--gm) 55%, var(--gs) 100%);
    box-shadow:
      inset 0 0 0 3px var(--gi),
      inset 0 4px 6px rgba(255,255,255,0.3),
      inset 0 -4px 6px rgba(0,0,0,0.5),
      0 0 0 1px #000,
      0 4px 16px rgba(0,0,0,0.6),
      0 0 24px rgba(226,76,76,0.25);
    display: grid; place-items: center;
    position: relative;
  }
  .hero-plate {
    width: 80%; height: 80%; border-radius: 50%;
    background: var(--el-magic);
    display: grid; place-items: center;
    font-family: "Titan One"; font-size: 44px; color: #fff;
    text-shadow: 0 2px 0 rgba(0,0,0,0.5);
    box-shadow:
      inset 0 0 0 1px rgba(0,0,0,0.6),
      inset 0 4px 8px rgba(255,255,255,0.25),
      inset 0 -6px 10px rgba(0,0,0,0.5);
  }
  .fig-title {
    font-family: "Titan One"; font-size: 22px; letter-spacing: 0.08em;
    color: var(--gb);
    -webkit-text-stroke: 0.75px var(--gi);
    text-shadow: 0 1px 0 var(--gs), 0 2px 0 var(--gi), 0 0 14px rgba(245,198,52,0.3);
  }

  /* Warning block sits in an inner dark card so the body copy has a
     solid contrasting surface (design_language.md §2 contrast contract). */
  .warning-card {
    padding: 14px 16px 12px;
    border-radius: 14px;
    background: linear-gradient(180deg, rgba(8,20,54,0.75), rgba(4,12,36,0.85));
    box-shadow:
      inset 0 0 0 1px rgba(255,192,192,0.25),
      inset 0 2px 4px rgba(0,0,0,0.4);
    margin-bottom: 18px;
  }
  .body-copy {
    text-align: center;
    font-family: "Fraunces"; font-size: 14px; line-height: 1.5;
    color: #f3e8e4;
    margin-bottom: 8px;
  }
  .body-copy strong {
    color: #ffd6d6;
    font-weight: 800;
    letter-spacing: 0.04em;
  }
  .grown-up {
    text-align: center;
    font-family: "Fraunces"; font-style: italic; font-weight: 600; font-size: 12px;
    color: #ffd6d6;
    letter-spacing: 0.1em;
  }

  /* ===== BUTTONS ===== */
  .actions { display: flex; flex-direction: column; gap: 10px; }
  .btn {
    width: 100%; padding: 14px;
    font-family: "Titan One"; font-size: 16px;
    letter-spacing: 0.22em; text-align: center;
    border: none; border-radius: 14px; cursor: pointer;
    position: relative;
  }
  /* Tertiary outline — the "safe back-out" button. Not a primary alternative
     (that'd be blue-card), not a primary action (that's the danger red).
     Muted-solid gold border marks it as recoverable/neutral. */
  .btn-tertiary {
    color: var(--gb);
    background: transparent;
    border: 2px solid #c9a84a;
    text-shadow: 0 1px 0 rgba(0,0,0,0.55);
    box-shadow: inset 0 1px 0 rgba(255,230,120,0.08), 0 2px 4px rgba(0,0,0,0.35);
  }
  .btn-tertiary:hover {
    border-color: var(--gb);
    background: rgba(245,198,52,0.08);
    box-shadow: inset 0 1px 0 rgba(255,230,120,0.15), 0 0 12px rgba(245,198,52,0.2);
  }
  .btn-tertiary:active { transform: translateY(2px); }

  /* Hold-to-confirm destructive button. A single quick tap does nothing;
     the user must press and hold ~1.2s while the fill sweeps left→right.
     Releasing early cancels and the fill reverts. Prevents fat-finger
     resets of a whole figure's progression. See design_language.md §4. */
  .btn-danger {
    color: #fff;
    background: linear-gradient(180deg, var(--danger-1) 0%, var(--danger-2) 55%, var(--danger-3) 100%);
    border: 2px solid var(--danger-b);
    text-shadow:
      0 0 2px rgba(0,0,0,0.9),
      0 1px 0 rgba(0,0,0,0.7),
      0 2px 6px rgba(0,0,0,0.5);
    box-shadow:
      inset 0 2px 0 rgba(255,255,255,0.2),
      inset 0 -2px 0 rgba(0,0,0,0.3),
      0 4px 0 var(--danger-3),
      0 5px 12px rgba(0,0,0,0.5),
      0 0 22px rgba(226,76,76,0.35);
    position: relative;
    overflow: hidden;
    isolation: isolate;
    touch-action: manipulation;
    -webkit-user-select: none; user-select: none;
  }
  .btn-danger:active {
    transform: translateY(3px);
    box-shadow:
      inset 0 2px 0 rgba(255,255,255,0.2),
      0 1px 0 var(--danger-3),
      0 3px 10px rgba(0,0,0,0.5);
  }
  .btn-danger .btn-label {
    position: relative;
    z-index: 2;
    pointer-events: none;
  }
  .btn-danger .hold-fill {
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, rgba(255,200,200,0.95), #fff);
    transform: scaleX(0);
    transform-origin: left center;
    transition: transform 0.2s ease-out;
    z-index: 1;
    pointer-events: none;
    mix-blend-mode: screen;
  }
  .btn-danger.holding .hold-fill {
    transform: scaleX(1);
    transition: transform var(--dur-hold-confirm, 1200ms) linear;
  }
  .btn-danger.fired {
    animation: danger-fire 0.42s ease-out;
  }
  .btn-danger.fired .hold-fill {
    transform: scaleX(1);
    background: #fff;
  }
  @keyframes danger-fire {
    0%   { transform: scale(1); }
    35%  { transform: scale(1.04); box-shadow: 0 0 44px rgba(255,255,255,0.85), 0 0 22px rgba(226,76,76,0.6); }
    100% { transform: scale(1); }
  }

  /* ===== RESET SEQUENCE ANIMATION =====
     Choreography after hold-to-confirm fires:

       t=0      .fired flash plays on the button (420ms)
       t=0      flakes spawn around the bezel rim, falling over ~1000ms
       t=0      bezel + hero plate desaturate over 1100ms (gold → gray,
                magic-purple → neutral) — thematic echo of the copy
                ("all of SPYRO's treasure ... gone forever")
       t=1100   panel scales down + fades; scrim fades; underlay unveils
                (blur → 0, opacity → 1, magic plate also desaturates)
       t=~2000  sequence complete. User is now looking at a "fresh"
                figure detail view through the cleared scrim.

     Real implementation: the server's `reset-to-fresh` command fires
     on .fired, the server responds with the new figure state via WS,
     and the phone plays this animation while the working copy is
     replaced on disk. The timing budget (~2s) also masks any file-IO
     latency on the server side. */

  .flake {
    position: fixed;
    width: 7px; height: 4px;
    border-radius: 2px;
    background: linear-gradient(135deg, var(--gb) 0%, var(--g) 55%, var(--gm) 100%);
    box-shadow: 0 0 6px rgba(255,220,120,0.55), inset 0 0 0 1px rgba(110,74,0,0.5);
    pointer-events: none;
    z-index: 50;
    will-change: transform, opacity;
    transform: translate(-50%, -50%);
  }
  @keyframes flake-fall {
    0%   { transform: translate(-50%, -50%) rotate(0deg); opacity: 1; }
    15%  { opacity: 1; }
    80%  { opacity: 0.85; }
    100% {
      transform: translate(calc(-50% + var(--fx)), calc(-50% + var(--fy))) rotate(var(--fr));
      opacity: 0;
    }
  }

  .hero-bezel.resetting {
    animation: bezel-drain 1100ms ease-in-out forwards;
  }
  @keyframes bezel-drain {
    0%   { filter: saturate(1) brightness(1); }
    55%  { filter: saturate(0.45) brightness(0.85); }
    100% { filter: saturate(0.1) brightness(0.65); }
  }

  .hero-plate.resetting {
    animation: plate-fade 1100ms ease-out forwards;
  }
  @keyframes plate-fade {
    0%   { filter: saturate(1) brightness(1); }
    100% { filter: saturate(0) brightness(0.55); }
  }

  .fig-title.resetting {
    animation: title-fade 1100ms ease-out forwards;
  }
  @keyframes title-fade {
    0%   { filter: saturate(1) brightness(1); }
    100% { filter: saturate(0.15) brightness(0.6); }
  }

  .panel.dismissing {
    animation: panel-out 520ms cubic-bezier(.5,0,.7,.5) forwards;
  }
  @keyframes panel-out {
    0%   { opacity: 1; transform: scale(1) translateY(0); }
    100% { opacity: 0; transform: scale(0.94) translateY(-6px); }
  }

  .scrim.dismissing {
    animation: scrim-out 700ms ease-out forwards;
  }
  @keyframes scrim-out {
    to { opacity: 0; }
  }

  .underlay.unveil {
    animation: unveil 900ms ease-out forwards;
  }
  @keyframes unveil {
    0%   { filter: blur(3px); opacity: 0.3; }
    100% { filter: blur(0);   opacity: 1; }
  }
  .underlay.unveil .u-hero .p {
    animation: u-plate-fade 900ms ease-out forwards;
  }
  @keyframes u-plate-fade {
    0%   { filter: saturate(1) brightness(1); }
    100% { filter: saturate(0) brightness(0.6); }
  }

  /* Replay control — dev-only, hidden on tight phone viewports. */
  .replay {
    position: fixed; top: 20px; right: 20px;
    padding: 8px 14px;
    font-family: "Titan One"; font-size: 11px; letter-spacing: 0.2em;
    color: #d0d0d0;
    background: rgba(20,20,20,0.85);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    cursor: pointer;
    z-index: 100;
  }
  .replay:hover { background: rgba(40,40,40,0.95); color: #fff; }
  @media (max-width: 450px) { .replay { display: none; } }
</style>
</head>
<body>
  <div class="phone">
    <div class="sky"></div>
    <div class="stars"></div>

    <div class="underlay">
      <div class="u-panel"></div>
      <div class="u-hero"><div class="p"></div></div>
    </div>

    <div class="scrim"></div>

    <div class="panel-wrap">
      <div class="panel">
        <div class="heading">RESET FIGURE?</div>
        <div class="warning-mark">△ THIS CAN'T BE UNDONE △</div>

        <div class="target">
          <div class="hero-bezel"><div class="hero-plate">S</div></div>
          <div class="fig-title">SPYRO</div>
        </div>

        <div class="warning-card">
          <div class="body-copy">
            All of <strong>SPYRO's</strong> treasure — level, gold, upgrades — will be gone forever.
          </div>
          <div class="grown-up">ask a grown-up first</div>
        </div>

        <div class="actions">
          <button class="btn btn-tertiary">KEEP SPYRO</button>
          <button class="btn btn-danger" data-hold data-reset-btn>
            <span class="hold-fill"></span>
            <span class="btn-label">HOLD TO RESET</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <button class="replay" id="replay">↻ REPLAY</button>

<script>
  // Hold-to-confirm for destructive buttons. Design rule: any `[data-hold]`
  // button on a danger-styled surface requires a ~1.2s press. Releasing
  // early cancels; holding through completes the action.
  const HOLD_MS = 1200;
  document.querySelectorAll('[data-hold]').forEach((btn) => {
    let timer = null;
    const start = (e) => {
      e.preventDefault();
      if (btn.classList.contains('fired') || btn.disabled) return;
      btn.classList.add('holding');
      timer = setTimeout(() => {
        btn.classList.remove('holding');
        btn.classList.add('fired');
        btn.disabled = true;
        console.log('[hold-to-confirm] fired:', btn.querySelector('.btn-label')?.textContent);
        setTimeout(() => btn.classList.remove('fired'), 600);
        if (btn.hasAttribute('data-reset-btn')) {
          // Wait for the fire flash to crest before the drain begins, so
          // the white flash reads as the "trigger" and the desaturation
          // reads as the "consequence".
          setTimeout(playResetSequence, 380);
        }
      }, HOLD_MS);
    };
    const cancel = () => {
      if (timer !== null) { clearTimeout(timer); timer = null; }
      btn.classList.remove('holding');
    };
    btn.addEventListener('pointerdown', start);
    btn.addEventListener('pointerup', cancel);
    btn.addEventListener('pointerleave', cancel);
    btn.addEventListener('pointercancel', cancel);
  });

  // Reset sequence — see the CSS block for the full choreography rationale.
  const FLAKE_COUNT = 14;
  function playResetSequence() {
    const panel   = document.querySelector('.panel');
    const bezel   = panel.querySelector('.hero-bezel');
    const plate   = panel.querySelector('.hero-plate');
    const title   = panel.querySelector('.fig-title');
    const scrim   = document.querySelector('.scrim');
    const underlay = document.querySelector('.underlay');

    // Flakes spawn at positions on the bezel rim (in viewport coords via
    // getBoundingClientRect), fall with random drift + rotation, fade.
    const rect = bezel.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const r  = rect.width / 2 - 3;
    for (let i = 0; i < FLAKE_COUNT; i++) {
      const flake = document.createElement('div');
      flake.className = 'flake';
      const angle = Math.random() * Math.PI * 2;
      flake.style.left = (cx + Math.cos(angle) * r) + 'px';
      flake.style.top  = (cy + Math.sin(angle) * r) + 'px';
      flake.style.setProperty('--fx', (Math.random() * 90 - 45).toFixed(1) + 'px');
      flake.style.setProperty('--fy', (70 + Math.random() * 90).toFixed(1) + 'px');
      flake.style.setProperty('--fr', (Math.random() * 360 - 180).toFixed(1) + 'deg');
      const dur = 700 + Math.random() * 400;
      const delay = Math.random() * 220;
      flake.style.animation = `flake-fall ${dur}ms ${delay}ms ease-in forwards`;
      document.body.appendChild(flake);
      setTimeout(() => flake.remove(), dur + delay + 80);
    }

    bezel.classList.add('resetting');
    plate.classList.add('resetting');
    title.classList.add('resetting');

    setTimeout(() => {
      panel.classList.add('dismissing');
      scrim.classList.add('dismissing');
      underlay.classList.add('unveil');
    }, 1100);
  }

  // Replay control for design review — restores initial state.
  document.getElementById('replay').addEventListener('click', () => {
    document.querySelectorAll('.flake').forEach((f) => f.remove());
    const panel = document.querySelector('.panel');
    const bezel = panel.querySelector('.hero-bezel');
    const plate = panel.querySelector('.hero-plate');
    const title = panel.querySelector('.fig-title');
    const scrim = document.querySelector('.scrim');
    const underlay = document.querySelector('.underlay');
    const btn = panel.querySelector('[data-reset-btn]');
    [panel, bezel, plate, title, scrim, underlay, btn].forEach((el) => {
      el.classList.remove('dismissing', 'resetting', 'unveil', 'holding', 'fired');
    });
    btn.disabled = false;
    // Re-trigger panel-in by forcing a reflow.
    panel.style.animation = 'none';
    void panel.offsetWidth;
    panel.style.animation = '';
    scrim.style.animation = 'none';
    void scrim.offsetWidth;
    scrim.style.animation = '';
  });
</script>
</body>
</html>
