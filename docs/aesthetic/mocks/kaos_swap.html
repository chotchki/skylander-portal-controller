<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=390,initial-scale=1,viewport-fit=cover"
        />
        <title>Kaos Swap — Heraldic — Skylanders Portal</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Titan+One&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,800;1,9..144,400&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --sf-1: #0b1e52;
                --sf-2: #061436;
                --sf-3: #020818;
                --gb: #ffe58a;
                --g: #f5c634;
                --gm: #c58c18;
                --gs: #6e4a00;
                --gi: #3a2500;
                --k-void-1: #1a0a40;
                --k-void-2: #120628;
                --k-void-3: #070212;
                --k-violet: #7a4eff;
                --k-violet-deep: #2d0f6a;
                --k-ember: #ff6b9e;
                --k-ember-deep: #8a2a56;
                --k-magenta: #da28a8;
                --k-magenta-bright: #ff4fd0;
                --text: #f7e8ff;
                --ink: #1a0030;
                --el-fire: linear-gradient(135deg, #ff6b2a, #b13310);
                --el-magic: linear-gradient(135deg, #da5ad6, #651564);
            }
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            html,
            body {
                height: 100%;
            }
            body {
                font-family: "Fraunces", Georgia, serif;
                background: #050208;
                display: grid;
                place-items: center;
                min-height: 100vh;
                padding: 20px;
                color: var(--text);
            }
            .phone {
                width: 390px;
                height: 844px;
                border-radius: 52px;
                overflow: hidden;
                position: relative;
                box-shadow:
                    0 30px 80px rgba(0, 0, 0, 0.6),
                    0 0 0 12px #1a1a1a,
                    0 0 0 13px #333;
                background: var(--sf-3);
            }
            @media (max-width: 450px) {
                body {
                    padding: 0;
                    background: var(--sf-3);
                }
                .phone {
                    width: 100vw;
                    height: 100vh;
                    border-radius: 0;
                    box-shadow: none;
                }
            }

            /* ===== UNDERLAY: the portal view (faded, gets invaded) ===== */
            .underlay {
                position: absolute;
                inset: 0;
                background:
                    radial-gradient(
                        ellipse 120% 60% at 50% 0%,
                        #1a3a8a 0%,
                        transparent 50%
                    ),
                    linear-gradient(
                        180deg,
                        var(--sf-1),
                        var(--sf-2) 60%,
                        var(--sf-3)
                    );
                z-index: 1;
            }
            .underlay-stars {
                position: absolute;
                inset: 0;
                background-image:
                    radial-gradient(1px 1px at 20px 30px, white, transparent),
                    radial-gradient(1px 1px at 130px 40px, white, transparent),
                    radial-gradient(
                        2px 2px at 230px 100px,
                        rgba(180, 220, 255, 0.9),
                        transparent
                    ),
                    radial-gradient(1px 1px at 300px 200px, white, transparent);
                background-size: 400px 800px;
                z-index: 2;
                opacity: 0.6;
            }
            .underlay-portal {
                position: absolute;
                inset: 120px 40px auto 40px;
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 16px 20px;
                z-index: 3;
                opacity: 0.35;
                filter: blur(1px);
                pointer-events: none;
            }
            .ghost-slot {
                aspect-ratio: 1;
                border-radius: 50%;
                background: radial-gradient(
                    circle at 30% 25%,
                    var(--gb),
                    var(--g) 22%,
                    var(--gm) 55%,
                    var(--gs)
                );
                box-shadow: inset 0 0 0 2px var(--gi);
                position: relative;
            }
            .ghost-slot::after {
                content: attr(data-l);
                position: absolute;
                inset: 10%;
                border-radius: 50%;
                background: var(--el-fire);
                display: grid;
                place-items: center;
                font-family: "Titan One";
                font-size: 26px;
                color: #fff;
            }

            /* ===== KAOS INVASION LAYER ===== */
            .kaos-wash {
                position: absolute;
                inset: 0;
                z-index: 10;
                background:
                    radial-gradient(
                        ellipse 80% 60% at 50% 50%,
                        rgba(45, 15, 106, 0.45) 0%,
                        rgba(26, 10, 64, 0.85) 60%,
                        rgba(7, 2, 18, 0.95) 100%
                    ),
                    radial-gradient(
                        ellipse 40% 40% at 50% 35%,
                        rgba(255, 107, 158, 0.2) 0%,
                        transparent 60%
                    );
                animation: wash-in 0.5s ease-out both;
            }
            @keyframes wash-in {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }

            /* purple lightning streaks across the edges */
            .kaos-edges {
                position: absolute;
                inset: 0;
                z-index: 11;
                pointer-events: none;
                background:
                    linear-gradient(
                        180deg,
                        var(--k-void-2) 0%,
                        transparent 18%,
                        transparent 82%,
                        var(--k-void-2) 100%
                    ),
                    linear-gradient(
                        90deg,
                        var(--k-void-2) 0%,
                        transparent 10%,
                        transparent 90%,
                        var(--k-void-2) 100%
                    );
                mix-blend-mode: multiply;
            }
            .kaos-sparks {
                position: absolute;
                inset: 0;
                z-index: 12;
                pointer-events: none;
                background-image:
                    radial-gradient(
                        2px 2px at 50px 120px,
                        var(--k-magenta-bright),
                        transparent
                    ),
                    radial-gradient(
                        1.5px 1.5px at 340px 180px,
                        var(--k-ember),
                        transparent
                    ),
                    radial-gradient(
                        2px 2px at 80px 340px,
                        var(--k-violet),
                        transparent
                    ),
                    radial-gradient(
                        1.5px 1.5px at 300px 480px,
                        var(--k-magenta-bright),
                        transparent
                    ),
                    radial-gradient(
                        2px 2px at 180px 600px,
                        var(--k-ember),
                        transparent
                    ),
                    radial-gradient(
                        1px 1px at 60px 720px,
                        var(--k-magenta-bright),
                        transparent
                    );
                background-size: 400px 800px;
                animation: sparks-flicker 3s ease-in-out infinite alternate;
            }
            @keyframes sparks-flicker {
                50% {
                    opacity: 0.5;
                    transform: scale(1.05);
                }
            }

            /* ===== KAOS STAGE ===== */
            .stage {
                position: absolute;
                inset: 0;
                z-index: 20;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 60px 28px 28px;
                gap: 18px;
            }

            /* Announcement sigil — Kaos head, mask-tinted in Kaos palette */

                width: 128px;
                height: 128px;
                position: relative;
                filter: drop-shadow(0 0 20px var(--k-magenta))
                    drop-shadow(0 0 40px var(--k-ember))
                    drop-shadow(0 0 60px rgba(255, 107, 158, 0.5));
                animation: sigil-pulse 2.2s ease-in-out infinite;
            }

            @keyframes sigil-pulse {
                0%,
                100% {
                    transform: scale(1);
                    filter: drop-shadow(0 0 20px var(--k-magenta))
                        drop-shadow(0 0 40px var(--k-ember))
                        drop-shadow(0 0 60px rgba(255, 107, 158, 0.5));
                }
                50% {
                    transform: scale(1.05);
                    filter: drop-shadow(0 0 30px var(--k-magenta-bright))
                        drop-shadow(0 0 60px var(--k-ember))
                        drop-shadow(0 0 90px rgba(255, 107, 158, 0.7));
                }
            }

            .kaos-title {
                font-family: "Titan One";
                font-size: 52px;
                letter-spacing: 0.05em;
                line-height: 0.95;
                text-align: center;
                color: var(--k-magenta-bright);
                -webkit-text-stroke: 1.5px var(--k-violet-deep);
                text-shadow:
                    0 2px 0 var(--k-ember-deep),
                    0 3px 0 var(--k-void-3),
                    0 0 28px var(--k-magenta),
                    0 0 56px rgba(255, 107, 158, 0.45);
                animation: title-shake 2.8s ease-in-out infinite;
            }
            @keyframes title-shake {
                0%,
                88%,
                100% {
                    transform: translateX(0);
                }
                90% {
                    transform: translateX(-3px) skewX(-2deg);
                }
                92% {
                    transform: translateX(3px) skewX(2deg);
                }
                94% {
                    transform: translateX(-2px);
                }
            }

            /* ===== SWAP VISUAL — before figure crashes into replacement ===== */
            .swap-row {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 2px;
                width: 100%;
                animation: swap-in 0.5s ease-out 0.2s both;
            }
            @keyframes swap-in {
                from {
                    opacity: 0;
                    transform: scale(0.8);
                }
                to {
                    opacity: 1;
                    transform: scale(1);
                }
            }

            .fig-bezel {
                width: 130px;
                height: 130px;
                border-radius: 50%;
                position: relative;
                flex-shrink: 0;
            }
            .fig-bezel .ring {
                position: absolute;
                inset: 0;
                border-radius: 50%;
                background: radial-gradient(
                    circle at 30% 25%,
                    var(--gb),
                    var(--g) 22%,
                    var(--gm) 55%,
                    var(--gs)
                );
                box-shadow:
                    inset 0 0 0 2.5px var(--gi),
                    inset 0 4px 5px rgba(255, 255, 255, 0.35),
                    inset 0 -4px 5px rgba(0, 0, 0, 0.5),
                    0 0 0 1px #000,
                    0 8px 24px rgba(0, 0, 0, 0.5),
                    0 0 32px rgba(255, 107, 158, 0.3);
            }
            .fig-bezel .plate {
                position: absolute;
                inset: 10%;
                border-radius: 50%;
                box-shadow:
                    inset 0 0 0 1.5px rgba(0, 0, 0, 0.6),
                    inset 0 5px 10px rgba(255, 255, 255, 0.25),
                    inset 0 -8px 14px rgba(0, 0, 0, 0.5);
                display: grid;
                place-items: center;
                color: #fff;
                font-family: "Titan One";
                font-size: 50px;
                text-shadow: 0 3px 6px rgba(0, 0, 0, 0.6);
            }

            /* Outgoing figure — fading with ember-pink stress marks */
            .outgoing {
                animation: figure-out 2s ease-in-out infinite;
            }
            @keyframes figure-out {
                0% {
                    transform: translateX(0) rotate(0);
                }
                50% {
                    transform: translateX(-10px) rotate(-3deg);
                }
                100% {
                    transform: translateX(-18px) rotate(-5deg);
                    opacity: 0.55;
                }
            }
            .outgoing .ring {
                filter: grayscale(0.4) hue-rotate(-30deg);
                box-shadow:
                    inset 0 0 0 2.5px var(--gi),
                    inset 0 4px 5px rgba(255, 255, 255, 0.25),
                    inset 0 -4px 5px rgba(0, 0, 0, 0.6),
                    0 0 0 1px #000,
                    0 0 30px rgba(227, 76, 76, 0.45);
            }
            .outgoing .plate::after {
                content: "✕";
                position: absolute;
                inset: 0;
                display: grid;
                place-items: center;
                font-family: "Titan One";
                font-size: 90px;
                color: #e34c4c;
                text-shadow: 0 0 20px rgba(227, 76, 76, 0.8);
            }

            /* Swap connector — lightning bolt between */
            .swap-bolt {
                flex-shrink: 0;
                font-family: "Titan One";
                font-size: 48px;
                color: var(--k-ember);
                text-shadow:
                    0 0 20px var(--k-magenta),
                    0 0 40px var(--k-ember);
                animation: bolt-crackle 0.6s ease-in-out infinite;
                transform: rotate(-10deg);
                margin: 0 -6px;
            }
            @keyframes bolt-crackle {
                0%,
                100% {
                    opacity: 0.8;
                    transform: rotate(-10deg) scale(1);
                }
                50% {
                    opacity: 1;
                    transform: rotate(-10deg) scale(1.15);
                }
            }

            /* Incoming figure — lifting into place with ember aura */
            .incoming {
                animation: figure-in 2.5s ease-in-out infinite;
            }
            @keyframes figure-in {
                0% {
                    transform: translateX(18px) scale(0.9);
                }
                60% {
                    transform: translateX(0) scale(1.05);
                }
                100% {
                    transform: translateX(0) scale(1);
                }
            }
            .incoming .ring {
                box-shadow:
                    inset 0 0 0 2.5px var(--gi),
                    inset 0 4px 5px rgba(255, 255, 255, 0.4),
                    inset 0 -4px 5px rgba(0, 0, 0, 0.4),
                    0 0 0 1px #000,
                    0 0 28px var(--k-magenta),
                    0 0 56px rgba(255, 107, 158, 0.5);
                animation: incoming-glow 1.8s ease-in-out infinite;
            }
            @keyframes incoming-glow {
                50% {
                    box-shadow:
                        inset 0 0 0 2.5px var(--gi),
                        inset 0 4px 5px rgba(255, 255, 255, 0.4),
                        0 0 0 1px #000,
                        0 0 40px var(--k-magenta-bright),
                        0 0 72px rgba(255, 107, 158, 0.7);
                }
            }

            .fig-name {
                text-align: center;
                font-family: "Titan One";
                font-size: 12px;
                letter-spacing: 0.12em;
                margin-top: 8px;
                text-shadow: 0 1px 0 rgba(0, 0, 0, 0.8);
            }
            .outgoing + .fig-name,
            .swap-cell.outgoing .fig-name {
                color: #ffd6d6;
            }
            .swap-cell {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 0;
            }
            .swap-cell .fig-name {
                margin-top: 10px;
            }
            .swap-cell.incoming .fig-name {
                color: var(--k-ember);
                text-shadow:
                    0 1px 0 rgba(0, 0, 0, 0.8),
                    0 0 8px var(--k-magenta);
            }
            .swap-cell.outgoing .fig-name {
                color: #ffd6d6;
                text-decoration: line-through;
                text-decoration-color: rgba(227, 76, 76, 0.7);
            }

            /* ===== KAOS TAUNT CARD ===== */
            .taunt-card {
                width: 100%;
                max-width: 330px;
                padding: 14px 18px;
                border-radius: 14px;
                background:
                    radial-gradient(
                        ellipse 120% 80% at 50% 0%,
                        rgba(255, 107, 158, 0.18),
                        transparent 60%
                    ),
                    linear-gradient(
                        180deg,
                        rgba(45, 15, 106, 0.92),
                        rgba(26, 10, 64, 0.95)
                    );
                border: 2px solid transparent;
                background-clip: padding-box;
                position: relative;
                animation: taunt-in 0.5s cubic-bezier(0.3, 1.3, 0.5, 1) 0.4s
                    both;
                opacity: 0;
            }
            .taunt-card::before {
                content: "";
                position: absolute;
                inset: -2px;
                border-radius: 16px;
                background: linear-gradient(
                    135deg,
                    var(--k-ember) 0%,
                    var(--k-magenta) 30%,
                    var(--k-violet) 60%,
                    var(--k-magenta-bright) 100%
                );
                z-index: -1;
            }
            @keyframes taunt-in {
                from {
                    opacity: 0;
                    transform: scale(0.9) translateY(14px);
                }
                to {
                    opacity: 1;
                    transform: scale(1) translateY(0);
                }
            }
            .taunt-body {
                font-family: "Fraunces";
                font-style: italic;
                font-size: 16px;
                line-height: 1.35;
                color: #ffd9ee;
                text-align: center;
                text-shadow:
                    0 1px 0 rgba(0, 0, 0, 0.6),
                    0 0 8px rgba(218, 40, 168, 0.3);
            }
            .taunt-attrib {
                font-family: "Titan One";
                font-size: 10px;
                letter-spacing: 0.3em;
                color: var(--k-ember);
                text-align: right;
                margin-top: 8px;
                text-shadow: 0 0 6px var(--k-magenta);
            }

            /* ===== DISMISS BUTTON — prominent, Kaos button treatment ===== */
            .dismiss-btn {
                width: 100%;
                max-width: 330px;
                padding: 16px;
                margin-top: 8px;
                font-family: "Titan One";
                font-size: 15px;
                letter-spacing: 0.22em;
                color: #fff;
                background: linear-gradient(
                    180deg,
                    var(--k-magenta-bright) 0%,
                    var(--k-magenta) 40%,
                    var(--k-ember-deep) 100%
                );
                border: 2px solid var(--k-ember);
                border-radius: 14px;
                cursor: pointer;
                text-shadow:
                    0 1px 0 var(--k-void-3),
                    0 0 12px rgba(255, 255, 255, 0.5);
                box-shadow:
                    inset 0 2px 0 rgba(255, 255, 255, 0.35),
                    inset 0 -2px 0 rgba(0, 0, 0, 0.3),
                    0 4px 0 var(--k-ember-deep),
                    0 8px 20px rgba(218, 40, 168, 0.4),
                    0 0 30px rgba(255, 107, 158, 0.3);
                animation: dismiss-pulse 2.5s ease-in-out infinite;
            }
            @keyframes dismiss-pulse {
                50% {
                    box-shadow:
                        inset 0 2px 0 rgba(255, 255, 255, 0.4),
                        inset 0 -2px 0 rgba(0, 0, 0, 0.3),
                        0 4px 0 var(--k-ember-deep),
                        0 8px 24px rgba(218, 40, 168, 0.6),
                        0 0 40px rgba(255, 107, 158, 0.5);
                }
            }
            .dismiss-btn:active {
                transform: translateY(3px);
                box-shadow:
                    inset 0 2px 0 rgba(255, 255, 255, 0.35),
                    0 1px 0 var(--k-ember-deep),
                    0 4px 12px rgba(218, 40, 168, 0.4);
            }
        </style>
    </head>
    <body>
        <div class="phone">
            <!-- The portal is still faintly visible through the Kaos wash -->
            <div class="underlay"></div>
            <div class="underlay-stars"></div>
            <div class="underlay-portal">
                <div class="ghost-slot" data-l="E"></div>
                <div class="ghost-slot" data-l="G"></div>
                <div class="ghost-slot" data-l="S"></div>
                <div class="ghost-slot" data-l="+"></div>
                <div class="ghost-slot" data-l="+"></div>
                <div class="ghost-slot" data-l="+"></div>
                <div class="ghost-slot" data-l="+"></div>
                <div class="ghost-slot" data-l="+"></div>
            </div>

            <!-- Kaos invades -->
            <div class="kaos-wash"></div>
            <div class="kaos-edges"></div>
            <div class="kaos-sparks"></div>

            <div class="stage">
                <div class="kaos-sigil"></div>
                <h1 class="kaos-title">KAOS<br />STRIKES!</h1>

                <div class="swap-row">
                    <div class="swap-cell outgoing">
                        <div class="fig-bezel outgoing">
                            <div class="ring"></div>
                            <div
                                class="plate"
                                style="background: var(--el-fire)"
                            >
                                E
                            </div>
                        </div>
                        <div class="fig-name">ERUPTOR</div>
                    </div>

                    <div class="swap-bolt">⚡</div>

                    <div class="swap-cell incoming">
                        <div class="fig-bezel incoming">
                            <div class="ring"></div>
                            <div
                                class="plate"
                                style="background: var(--el-magic)"
                            >
                                S
                            </div>
                        </div>
                        <div class="fig-name">SPYRO</div>
                    </div>
                </div>

                <div class="taunt-card">
                    <div class="taunt-body">
                        You think YOUR choice of hero matters? Behold — I swap
                        them at my WHIM!
                    </div>
                    <div class="taunt-attrib">— KAOS</div>
                </div>

                <button class="dismiss-btn">BACK TO THE BATTLE</button>
            </div>
        </div>
    </body>
</html>
