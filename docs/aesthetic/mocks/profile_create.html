<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=390,initial-scale=1,viewport-fit=cover">
<title>Profile Creation — Heraldic — Skylanders Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Titan+One&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,800;1,9..144,400&display=swap" rel="stylesheet">
<style>
  :root {
    --sf-1: #0b1e52; --sf-2: #061436; --sf-3: #020818;
    --gb: #ffe58a; --g: #f5c634; --gm: #c58c18; --gs: #6e4a00; --gi: #3a2500;
    --text: #f7f7fb; --ink: #1a1203;
    --el-fire:   linear-gradient(135deg, #ff6b2a, #b13310);
    --el-water:  linear-gradient(135deg, #2aa6ff, #0f4d8a);
    --el-life:   linear-gradient(135deg, #5ac96b, #26612e);
    --el-magic:  linear-gradient(135deg, #da5ad6, #651564);
    --el-undead: linear-gradient(135deg, #8a62c9, #3b215f);
    --el-tech:   linear-gradient(135deg, #ffb84d, #a56500);
    --el-earth:  linear-gradient(135deg, #a77b3a, #5a3a13);
    --el-air:    linear-gradient(135deg, #c6e6ff, #7ea9cc);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Fraunces", Georgia, serif;
    background: #0a0a0a;
    display: grid; place-items: center;
    min-height: 100vh; padding: 20px;
    color: var(--text);
  }
  .phone {
    width: 390px; height: 844px;
    border-radius: 52px; overflow: hidden; position: relative;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 12px #1a1a1a, 0 0 0 13px #333;
    background: var(--sf-3);
  }
  @media (max-width: 450px) {
    body { padding: 0; background: var(--sf-3); }
    .phone { width: 100vw; height: 100vh; border-radius: 0; box-shadow: none; }
  }

  .sky {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 120% 60% at 50% 0%, #1a3a8a 0%, transparent 50%),
      radial-gradient(ellipse 80% 50% at 50% 100%, #0e2464 0%, transparent 50%),
      linear-gradient(180deg, var(--sf-1), var(--sf-2) 60%, var(--sf-3));
  }
  .stars {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 20px 30px, white, transparent),
      radial-gradient(1px 1px at 40px 70px, rgba(255,255,255,0.7), transparent),
      radial-gradient(2px 2px at 50px 160px, rgba(255,230,180,0.9), transparent),
      radial-gradient(1px 1px at 130px 40px, white, transparent),
      radial-gradient(1px 1px at 90px 250px, rgba(255,255,255,0.8), transparent),
      radial-gradient(1px 1px at 170px 300px, white, transparent),
      radial-gradient(2px 2px at 230px 100px, rgba(180,220,255,0.9), transparent),
      radial-gradient(1px 1px at 300px 200px, white, transparent),
      radial-gradient(1px 1px at 260px 400px, white, transparent),
      radial-gradient(2px 2px at 320px 620px, rgba(255,230,180,0.8), transparent),
      radial-gradient(1px 1px at 80px 720px, white, transparent);
    background-size: 400px 800px;
  }

  .viewport {
    position: relative; height: 100%;
    padding: 44px 22px 22px;
    display: flex; flex-direction: column; gap: 16px;
  }

  /* ========== STEP INDICATOR =========
     Cartoony display label — no dots. Dots would have clashed visually
     with the PIN-dot gold bezels on steps 3/4. */
  .step-counter {
    text-align: center;
    font-family: "Titan One";
    font-size: 20px;
    letter-spacing: 0.12em;
    color: var(--gb);
    -webkit-text-stroke: 0.75px var(--gi);
    text-shadow:
      0 2px 0 var(--gs),
      0 3px 0 var(--gi),
      0 5px 10px rgba(0,0,0,0.5),
      0 0 18px rgba(245,198,52,0.35);
  }

  /* ========== HEADING ========== */
  .heading-wrap { text-align: center; }
  .title-sub {
    font-family: "Fraunces"; font-style: italic; font-weight: 600;
    font-size: 13px; letter-spacing: 0.25em;
    color: #fff4e0; text-transform: uppercase;
    margin-bottom: 6px;
    text-shadow: 0 1px 0 rgba(0,0,0,0.5);
  }
  .heading {
    font-family: "Titan One"; font-size: 30px; letter-spacing: 0.05em;
    line-height: 0.95;
    color: var(--gb);
    -webkit-text-stroke: 1.5px var(--gi);
    text-shadow:
      0 2px 0 var(--gs), 0 3px 0 var(--gi),
      0 5px 10px rgba(0,0,0,0.5),
      0 0 28px rgba(245,198,52,0.25);
  }

  /* ========== SCREEN / CONTENT ========== */
  .screen { display: none; flex-direction: column; gap: 16px; flex: 1; min-height: 0; }
  .screen.active { display: flex; }

  /* ----- STEP 1: NAME ----- */
  .name-wrap { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 20px; padding: 0 2px; min-height: 0; }
  .name-input-row {
    display: flex; align-items: stretch; gap: 10px;
    width: 100%;
  }
  .name-input {
    flex: 1 1 0;
    min-width: 0;          /* allow the flex child to actually shrink — default min-width:auto is why the roll button was pushed off-screen */
    width: 100%;
    padding: 16px 18px;
    background: linear-gradient(180deg, #2f6edc 0%, #1e4fb3 55%, #153a8a 100%);
    border: 2px solid var(--gb);
    border-radius: 14px;
    color: #fff;
    font-family: "Titan One"; font-size: 22px; letter-spacing: 0.04em;
    text-shadow: 0 1px 0 rgba(0,0,0,0.5);
    text-align: center;
    box-shadow:
      inset 0 2px 0 rgba(255,255,255,0.25),
      inset 0 -2px 0 rgba(0,0,0,0.3),
      0 3px 8px rgba(0,0,0,0.5);
    outline: none;
  }
  .name-input:focus {
    outline: 2px solid rgba(255,230,120,0.6);
    outline-offset: 2px;
  }
  .name-input::placeholder { color: #e8e4d8; font-style: italic; font-weight: 600; opacity: 1; }
  .roll-btn {
    flex: 0 0 54px;        /* never shrinks, never grows */
    width: 54px;
    background: radial-gradient(circle at 30% 25%, var(--gb) 0%, var(--g) 40%, var(--gm) 80%);
    border: 2px solid var(--gi);
    border-radius: 14px;
    color: var(--ink);
    font-size: 22px;
    cursor: pointer;
    display: grid; place-items: center;
    box-shadow:
      inset 0 2px 0 rgba(255,255,255,0.4),
      inset 0 -2px 0 rgba(0,0,0,0.3),
      0 3px 0 var(--gs),
      0 5px 10px rgba(0,0,0,0.45);
    transition: transform 0.15s ease;
  }
  .roll-btn:active { transform: translateY(2px) rotate(-60deg); }
  .name-hint {
    text-align: center;
    font-family: "Fraunces"; font-style: italic; font-weight: 600;
    font-size: 12px; letter-spacing: 0.08em;
    color: #d9c88a;
    text-shadow: 0 1px 0 rgba(0,0,0,0.55);
  }

  /* ----- STEP 2: COLOR ----- */
  .color-wrap { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 20px; }
  .color-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
    padding: 0 2px;
  }
  .color-swatch {
    aspect-ratio: 1;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 25%, var(--gb), var(--g) 22%, var(--gm) 55%, var(--gs) 100%);
    box-shadow:
      inset 0 0 0 2px var(--gi),
      inset 0 3px 4px rgba(255,255,255,0.3),
      inset 0 -3px 4px rgba(0,0,0,0.5),
      0 0 0 1px #000,
      0 4px 10px rgba(0,0,0,0.5);
    position: relative;
    cursor: pointer;
    transition: transform 0.15s ease;
  }
  .color-swatch::before {
    content: "";
    position: absolute; inset: 10%;
    border-radius: 50%;
    box-shadow:
      inset 0 0 0 1px rgba(0,0,0,0.6),
      inset 0 4px 8px rgba(255,255,255,0.25),
      inset 0 -6px 10px rgba(0,0,0,0.5);
  }
  .color-swatch[data-color="fire"]::before   { background: var(--el-fire); }
  .color-swatch[data-color="water"]::before  { background: var(--el-water); }
  .color-swatch[data-color="life"]::before   { background: var(--el-life); }
  .color-swatch[data-color="magic"]::before  { background: var(--el-magic); }
  .color-swatch[data-color="undead"]::before { background: var(--el-undead); }
  .color-swatch[data-color="tech"]::before   { background: var(--el-tech); }
  .color-swatch[data-color="earth"]::before  { background: var(--el-earth); }
  .color-swatch[data-color="air"]::before    { background: var(--el-air); }
  .color-swatch:hover { transform: translateY(-2px); }
  .color-swatch.selected {
    transform: scale(1.06);
    box-shadow:
      inset 0 0 0 2px var(--gi),
      inset 0 3px 4px rgba(255,255,255,0.3),
      inset 0 -3px 4px rgba(0,0,0,0.5),
      0 0 0 1px #000,
      0 0 0 3px var(--gb),
      0 0 24px rgba(245,198,52,0.6),
      0 4px 12px rgba(0,0,0,0.5);
  }
  .color-swatch.selected::after {
    content: "✓";
    position: absolute; inset: 0;
    display: grid; place-items: center;
    font-family: "Titan One"; font-size: 34px;
    color: #fff;
    text-shadow: 0 2px 0 rgba(0,0,0,0.7), 0 0 12px rgba(0,0,0,0.5);
    z-index: 2;
  }

  /* ----- STEP 3 / 4: PIN -----
     Tight layout — identity and title live on a single row so the
     keypad + action buttons fit comfortably in 390×844 without
     clipping. Dots anchor near the top, keypad stays pinned to the
     bottom (`.pin-panel` has `margin-top: auto`) so the mismatch
     error has a stable reserved slot to pop into without shifting
     either the dots or the keypad. */
  .pin-wrap { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .pin-heading {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    flex-wrap: wrap;
  }
  .identity-bezel {
    width: 46px; height: 46px; border-radius: 50%;
    background: radial-gradient(circle at 30% 25%, var(--gb), var(--g) 22%, var(--gm) 55%, var(--gs) 100%);
    box-shadow: inset 0 0 0 2px var(--gi), 0 3px 8px rgba(0,0,0,0.5);
    position: relative;
    flex-shrink: 0;
  }
  .identity-bezel::before {
    content: "";
    position: absolute; inset: 10%;
    border-radius: 50%;
    background: var(--el-magic);
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.6);
  }
  .identity-bezel::after {
    content: attr(data-initial);
    position: absolute; inset: 0;
    display: grid; place-items: center;
    font-family: "Titan One"; font-size: 20px;
    color: #fff;
    text-shadow: 0 2px 0 rgba(0,0,0,0.5);
  }
  .pin-heading-text { text-align: left; }
  .pin-heading-sub {
    font-family: "Fraunces"; font-style: italic; font-weight: 600;
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    color: #d9c88a;
    text-shadow: 0 1px 0 rgba(0,0,0,0.5);
  }
  .pin-heading-title {
    font-family: "Titan One"; font-size: 22px; letter-spacing: 0.06em;
    color: var(--gb);
    -webkit-text-stroke: 1px var(--gi);
    text-shadow: 0 2px 0 var(--gs), 0 3px 0 var(--gi), 0 4px 8px rgba(0,0,0,0.5), 0 0 18px rgba(245,198,52,0.3);
    margin-top: -2px;
  }
  .pin-dots {
    display: flex; justify-content: center; gap: 20px;
    margin: 10px 0 0;
    flex-shrink: 0;
  }
  .pin-dot {
    width: 22px; height: 22px; border-radius: 50%;
    background: radial-gradient(circle at 30% 25%, rgba(245,198,52,0.2), rgba(110,74,0,0.3) 60%, rgba(0,0,0,0.4));
    box-shadow: inset 0 0 0 1.5px var(--gi), inset 0 1px 2px rgba(0,0,0,0.5);
    transition: all 0.2s ease;
  }
  .pin-dot.filled {
    background: radial-gradient(circle at 30% 25%, var(--gb), var(--g) 40%, var(--gm) 80%);
    box-shadow: inset 0 0 0 1.5px var(--gi), inset 0 1px 2px rgba(255,255,255,0.3), 0 0 8px rgba(245,198,52,0.5);
  }

  /* PIN-entry framed panel — holds only the keypad. Pinned to the
     bottom of .pin-wrap so the reserved error slot above doesn't push
     it around when the banner appears. */
  .pin-panel {
    position: relative;
    padding: 16px;
    border-radius: 18px;
    background: linear-gradient(180deg, rgba(26,58,138,0.88), rgba(10,36,100,0.94) 50%, rgba(6,20,54,0.96));
    margin-top: auto;
    flex-shrink: 0;
  }
  .pin-panel::before {
    content: ""; position: absolute; inset: -2px;
    border-radius: 20px; z-index: -1;
    background: linear-gradient(135deg, var(--gb) 0%, var(--gm) 30%, var(--gb) 50%, var(--gm) 70%, var(--gb) 100%);
  }
  .keypad {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
  }
  .key {
    aspect-ratio: 1.3;
    border-radius: 14px;
    background: linear-gradient(180deg, rgba(255,230,120,0.10), rgba(58,37,0,0.28) 100%);
    border: 1.5px solid var(--gi);
    color: var(--gb);
    font-family: "Titan One"; font-size: 24px;
    cursor: pointer;
    display: grid; place-items: center;
    box-shadow: inset 0 2px 0 rgba(255,230,120,0.15), inset 0 -2px 0 rgba(0,0,0,0.25), 0 2px 4px rgba(0,0,0,0.45);
    text-shadow: 0 1px 0 var(--gs), 0 0 6px rgba(245,198,52,0.25);
  }
  .key:hover { background: linear-gradient(180deg, rgba(255,230,120,0.2), rgba(58,37,0,0.35) 100%); }
  .key:active { transform: translateY(1px); }
  .key.ghost { background: transparent; border: 1.5px solid transparent; box-shadow: none; cursor: default; }
  .key.backspace { font-size: 20px; }

  /* Pin mismatch banner (step 4 only).
     Always occupies its slot (min-height reserved) so the mismatch
     state doesn't shove the dots up or the keypad down — common-error
     conditions must not reflow the layout. Animates opacity + a small
     slide+bounce when it actually appears. */
  .pin-error {
    min-height: 36px;
    margin: 12px 0 0;
    text-align: center;
    font-family: "Fraunces"; font-style: italic; font-weight: 600;
    font-size: 12px; letter-spacing: 0.12em;
    color: #ffd0d0;
    background: rgba(227,76,76,0.2);
    border: 1px solid rgba(255,160,160,0.5);
    border-radius: 10px;
    padding: 8px 12px;
    text-shadow: 0 1px 0 rgba(0,0,0,0.5);
    /* Hidden but space-reserved. visibility:hidden + opacity 0 so we
       can transition opacity/transform on state change. */
    visibility: hidden;
    opacity: 0;
    transform: translateY(-4px) scale(0.96);
    transition: opacity 0.22s ease-out, transform 0.28s cubic-bezier(.3,1.5,.5,1);
  }
  .screen[data-step="confirm"].mismatch .pin-error {
    visibility: visible;
    opacity: 1;
    transform: translateY(0) scale(1);
    animation: mismatch-pop 0.42s cubic-bezier(.3,1.5,.5,1);
  }
  @keyframes mismatch-pop {
    0%   { opacity: 0; transform: translateY(-10px) scale(0.9); }
    55%  { opacity: 1; transform: translateY(2px) scale(1.03); }
    80%  { transform: translateY(-1px) scale(0.995); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  /* Reinforce the error with a brief shake on the dots — same frame. */
  .screen[data-step="confirm"].mismatch .pin-dots {
    animation: dots-shake 0.42s cubic-bezier(.3,1,.5,1);
  }
  @keyframes dots-shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(3px); }
  }

  /* ========== BUTTONS ========== */
  .actions {
    display: flex; gap: 10px; margin-top: auto;
  }
  .btn {
    flex: 1; padding: 14px;
    font-family: "Titan One"; font-size: 15px; letter-spacing: 0.22em;
    border: none; border-radius: 14px; cursor: pointer;
    text-align: center;
  }
  .btn-primary {
    color: var(--ink);
    background: linear-gradient(180deg, var(--gb) 0%, var(--g) 45%, var(--gm) 100%);
    border: 2px solid var(--gi);
    text-shadow: 0 1px 0 rgba(255,255,255,0.4);
    box-shadow:
      inset 0 2px 0 rgba(255,255,255,0.45),
      inset 0 -2px 0 rgba(0,0,0,0.25),
      0 4px 0 var(--gs),
      0 6px 14px rgba(0,0,0,0.45),
      0 0 20px rgba(245,198,52,0.25);
  }
  .btn-primary:disabled {
    filter: saturate(0.35) brightness(0.65);
    cursor: not-allowed;
    box-shadow: inset 0 2px 0 rgba(255,255,255,0.15), 0 2px 4px rgba(0,0,0,0.3);
  }
  .btn-primary:active:not(:disabled) {
    transform: translateY(3px);
    box-shadow: inset 0 2px 0 rgba(255,255,255,0.45), 0 1px 0 var(--gs);
  }
  .btn-back {
    flex: 0 0 90px;
    color: var(--gb);
    background: transparent;
    border: 2px solid #c9a84a;
    text-shadow: 0 1px 0 rgba(0,0,0,0.5);
    letter-spacing: 0.18em;
  }
  .btn-back:hover { border-color: var(--gb); background: rgba(245,198,52,0.08); }

  /* ========== DEMO CONTROLS ========== */
  .demo-controls {
    position: fixed; bottom: 16px; right: 16px;
    z-index: 999;
    background: rgba(0,0,0,0.85);
    border: 1px solid #333; border-radius: 10px;
    padding: 10px;
    display: flex; gap: 6px; flex-direction: column;
    font-family: system-ui; font-size: 11px;
  }
  .demo-controls .title { color: var(--gb); font-weight: 600; margin-bottom: 2px; }
  .demo-controls button {
    background: #222; color: #eee;
    border: 1px solid #444; border-radius: 6px;
    padding: 5px 9px; cursor: pointer; font: inherit;
  }
  .demo-controls button:hover { background: #333; color: var(--gb); }
  .demo-controls button.on { background: var(--g); color: var(--ink); }
</style>
</head>
<body>
  <div class="phone">
    <div class="sky"></div>
    <div class="stars"></div>

    <div class="viewport">
      <!-- Step indicator — single cartoony display label, no dot row -->
      <div class="step-counter" id="step-counter">STEP 1 OF 4</div>

      <!-- ============ STEP 1: NAME ============ -->
      <div class="screen" data-step="name">
        <div class="heading-wrap">
          <div class="title-sub">new portal master</div>
          <h1 class="heading">WHAT'S<br>YOUR NAME?</h1>
        </div>

        <div class="name-wrap">
          <div class="name-input-row">
            <input class="name-input" id="name-input" type="text" maxlength="16" autocomplete="off" spellcheck="false" value="Spyro">
            <button class="roll-btn" id="roll-btn" title="pick another">↻</button>
          </div>
          <div class="name-hint">anything you like · or tap ↻ for a random one</div>
        </div>

        <div class="actions">
          <button class="btn btn-primary" data-action="next">NEXT</button>
        </div>
      </div>

      <!-- ============ STEP 2: COLOR ============ -->
      <div class="screen" data-step="color">
        <div class="heading-wrap">
          <div class="title-sub">pick your color</div>
          <h1 class="heading">CHOOSE<br>YOUR MARK</h1>
        </div>

        <div class="color-wrap">
          <div class="color-grid">
            <div class="color-swatch" data-color="fire"></div>
            <div class="color-swatch" data-color="water"></div>
            <div class="color-swatch" data-color="life"></div>
            <div class="color-swatch" data-color="magic"></div>
            <div class="color-swatch" data-color="tech"></div>
            <div class="color-swatch" data-color="undead"></div>
            <div class="color-swatch" data-color="earth"></div>
            <div class="color-swatch" data-color="air"></div>
          </div>
        </div>

        <div class="actions">
          <button class="btn btn-back" data-action="back">BACK</button>
          <button class="btn btn-primary" data-action="next" disabled>NEXT</button>
        </div>
      </div>

      <!-- ============ STEP 3: PIN SET ============ -->
      <div class="screen" data-step="pin">
        <div class="pin-heading">
          <div class="identity-bezel" data-initial="S"></div>
          <div class="pin-heading-text">
            <div class="pin-heading-sub">for <span id="identity-name-pin">SPYRO</span></div>
            <div class="pin-heading-title">CHOOSE YOUR PIN</div>
          </div>
        </div>

        <div class="pin-wrap">
          <div class="pin-dots" id="pin-dots-set">
            <div class="pin-dot"></div><div class="pin-dot"></div>
            <div class="pin-dot"></div><div class="pin-dot"></div>
          </div>

          <div class="pin-panel">
            <div class="keypad" data-keypad="set">
              <button class="key">1</button><button class="key">2</button><button class="key">3</button>
              <button class="key">4</button><button class="key">5</button><button class="key">6</button>
              <button class="key">7</button><button class="key">8</button><button class="key">9</button>
              <button class="key ghost"></button><button class="key">0</button><button class="key backspace">⌫</button>
            </div>
          </div>
        </div>

        <div class="actions">
          <button class="btn btn-back" data-action="back">BACK</button>
          <button class="btn btn-primary" data-action="next" disabled>NEXT</button>
        </div>
      </div>

      <!-- ============ STEP 4: PIN CONFIRM ============ -->
      <div class="screen" data-step="confirm">
        <div class="pin-heading">
          <div class="identity-bezel" data-initial="S"></div>
          <div class="pin-heading-text">
            <div class="pin-heading-sub">for <span id="identity-name-confirm">SPYRO</span></div>
            <div class="pin-heading-title">TYPE IT AGAIN</div>
          </div>
        </div>

        <div class="pin-wrap">
          <div class="pin-dots" id="pin-dots-confirm">
            <div class="pin-dot"></div><div class="pin-dot"></div>
            <div class="pin-dot"></div><div class="pin-dot"></div>
          </div>
          <div class="pin-error">those pins don't match · try once more</div>

          <div class="pin-panel">
            <div class="keypad" data-keypad="confirm">
              <button class="key">1</button><button class="key">2</button><button class="key">3</button>
              <button class="key">4</button><button class="key">5</button><button class="key">6</button>
              <button class="key">7</button><button class="key">8</button><button class="key">9</button>
              <button class="key ghost"></button><button class="key">0</button><button class="key backspace">⌫</button>
            </div>
          </div>
        </div>

        <div class="actions">
          <button class="btn btn-back" data-action="back">BACK</button>
          <button class="btn btn-primary" data-action="next" disabled>CREATE</button>
        </div>
      </div>
    </div>

    <div class="demo-controls">
      <div class="title">Profile create demo</div>
      <button data-goto="name">1 · Name</button>
      <button data-goto="color">2 · Color</button>
      <button data-goto="pin">3 · PIN set</button>
      <button data-goto="confirm">4 · PIN confirm</button>
      <button data-goto="confirm" data-mismatch>+ mismatch</button>
    </div>
  </div>

<script>
  const STEPS = ["name", "color", "pin", "confirm"];
  const SKYLANDER_NAMES = [
    "Spyro", "Eruptor", "Stealth Elf", "Trigger Happy", "Gill Grunt",
    "Pop Fizz", "Chop Chop", "Cynder", "Wrecking Ball", "Hex",
    "Drobot", "Boomer", "Whirlwind", "Flashwing", "Jet-Vac",
    "Terrafin", "Bash", "Dino-Rang", "Zook", "Shroomboom"
  ];

  const state = {
    step: "name",
    name: "Spyro",
    color: null,
    pin: "",
    confirmPin: "",
    mismatch: false,
  };

  const screens = {
    name: document.querySelector('.screen[data-step="name"]'),
    color: document.querySelector('.screen[data-step="color"]'),
    pin: document.querySelector('.screen[data-step="pin"]'),
    confirm: document.querySelector('.screen[data-step="confirm"]'),
  };
  const stepLabel = document.getElementById('step-counter');
  const nameInput = document.getElementById('name-input');
  const rollBtn = document.getElementById('roll-btn');
  const identNameA = document.getElementById('identity-name-pin');
  const identNameB = document.getElementById('identity-name-confirm');
  const identBezels = document.querySelectorAll('.identity-bezel');
  const pinDotsSet = document.getElementById('pin-dots-set');
  const pinDotsConfirm = document.getElementById('pin-dots-confirm');

  function rerender() {
    // Screens
    Object.entries(screens).forEach(([key, el]) => el.classList.toggle('active', key === state.step));
    // Step counter
    const currentIdx = STEPS.indexOf(state.step);
    stepLabel.textContent = `STEP ${currentIdx + 1} OF 4`;
    // Identity previews
    identNameA.textContent = state.name.toUpperCase();
    identNameB.textContent = state.name.toUpperCase();
    identBezels.forEach(b => b.setAttribute('data-initial', state.name.trim().charAt(0).toUpperCase() || '?'));
    // NEXT button enablement per step
    updateNextButtons();
    // PIN dots
    renderDots(pinDotsSet, state.pin);
    renderDots(pinDotsConfirm, state.confirmPin);
    // Mismatch class
    screens.confirm.classList.toggle('mismatch', state.mismatch);
  }
  function renderDots(container, value) {
    container.querySelectorAll('.pin-dot').forEach((d, i) => {
      d.classList.toggle('filled', i < value.length);
    });
  }
  function updateNextButtons() {
    const nameOK = state.name.trim().length > 0;
    const colorOK = !!state.color;
    const pinOK = state.pin.length === 4;
    const confirmOK = state.confirmPin.length === 4 && state.confirmPin === state.pin;
    screens.name.querySelector('[data-action="next"]').disabled = !nameOK;
    screens.color.querySelector('[data-action="next"]').disabled = !colorOK;
    screens.pin.querySelector('[data-action="next"]').disabled = !pinOK;
    screens.confirm.querySelector('[data-action="next"]').disabled = !confirmOK;
  }
  function goto(step) { state.step = step; rerender(); }
  function next() {
    const i = STEPS.indexOf(state.step);
    if (i === STEPS.length - 1) {
      if (state.confirmPin === state.pin) {
        console.log('[mock] profile created:', state.name, state.color, state.pin);
      }
      return;
    }
    goto(STEPS[i + 1]);
    state.mismatch = false;
  }
  function back() {
    const i = STEPS.indexOf(state.step);
    if (i > 0) goto(STEPS[i - 1]);
  }

  // Name input
  nameInput.addEventListener('input', (e) => { state.name = e.target.value; rerender(); });
  nameInput.addEventListener('focus', (e) => e.target.select());
  rollBtn.addEventListener('click', () => {
    const pick = SKYLANDER_NAMES[Math.floor(Math.random() * SKYLANDER_NAMES.length)];
    state.name = pick; nameInput.value = pick; rerender();
  });

  // Color swatches
  document.querySelectorAll('.color-swatch').forEach(sw => {
    sw.addEventListener('click', () => {
      state.color = sw.dataset.color;
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      sw.classList.add('selected');
      rerender();
    });
  });

  // Keypad
  document.querySelectorAll('[data-keypad]').forEach(pad => {
    pad.addEventListener('click', (e) => {
      const key = e.target.closest('.key');
      if (!key || key.classList.contains('ghost')) return;
      const which = pad.dataset.keypad;
      let value = which === 'set' ? state.pin : state.confirmPin;
      if (key.classList.contains('backspace')) {
        value = value.slice(0, -1);
      } else if (value.length < 4) {
        value += key.textContent;
      }
      if (which === 'set') state.pin = value; else state.confirmPin = value;
      // On confirm step, mismatch banner shows if 4 digits entered and don't match
      if (which === 'confirm' && state.confirmPin.length === 4) {
        state.mismatch = state.confirmPin !== state.pin;
      } else if (which === 'confirm') {
        state.mismatch = false;
      }
      rerender();
    });
  });

  // Action buttons
  document.querySelectorAll('[data-action]').forEach(btn => {
    btn.addEventListener('click', () => {
      if (btn.disabled) return;
      if (btn.dataset.action === 'next') next();
      else if (btn.dataset.action === 'back') back();
    });
  });

  // Demo controls
  document.querySelectorAll('.demo-controls [data-goto]').forEach(b => {
    b.addEventListener('click', () => {
      if (b.hasAttribute('data-mismatch')) {
        state.pin = '1234'; state.confirmPin = '9999'; state.mismatch = true;
      }
      goto(b.dataset.goto);
    });
  });

  rerender();
</script>
</body>
</html>
