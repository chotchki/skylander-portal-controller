<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=390,initial-scale=1,viewport-fit=cover">
<title>Figure Detail — Heraldic — Skylanders Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Titan+One&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,800;1,9..144,400&display=swap" rel="stylesheet">
<style>
  :root {
    --sf-1: #0b1e52; --sf-2: #061436; --sf-3: #020818;
    --gb: #ffe58a; --g: #f5c634; --gm: #c58c18; --gs: #6e4a00; --gi: #3a2500;
    --text: #f7f7fb; --ink: #1a1203; --danger: #e34c4c;
    --el-fire: linear-gradient(135deg, #ff6b2a, #b13310);
    --el-water: linear-gradient(135deg, #2aa6ff, #0f4d8a);
    --el-magic: linear-gradient(135deg, #da5ad6, #651564);
    --el-life: linear-gradient(135deg, #5ac96b, #26612e);
    --wood-1: #6e5032; --wood-2: #4a3220; --wood-3: #352416; --wood-4: #251810;
    --wood-gold: #d4a84a; --wood-gold-b: #f0d080;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Fraunces", Georgia, serif;
    background: #0a0a0a;
    display: grid; place-items: center;
    min-height: 100vh; padding: 20px;
    color: var(--text);
  }
  .phone {
    width: 390px; height: 844px;
    border-radius: 52px; overflow: hidden; position: relative;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 12px #1a1a1a, 0 0 0 13px #333;
    background: var(--sf-3);
  }
  @media (max-width: 450px) {
    body { padding: 0; background: var(--sf-3); }
    .phone { width: 100vw; height: 100vh; border-radius: 0; box-shadow: none; }
  }
  .sky {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 120% 60% at 50% 0%, #1a3a8a 0%, transparent 50%),
      radial-gradient(ellipse 80% 50% at 50% 100%, #0e2464 0%, transparent 50%),
      linear-gradient(180deg, var(--sf-1), var(--sf-2) 60%, var(--sf-3));
  }
  .stars {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 20px 30px, white, transparent),
      radial-gradient(1px 1px at 40px 70px, rgba(255,255,255,0.7), transparent),
      radial-gradient(2px 2px at 50px 160px, rgba(255,230,180,0.9), transparent),
      radial-gradient(1px 1px at 130px 40px, white, transparent),
      radial-gradient(1px 1px at 90px 250px, rgba(255,255,255,0.8), transparent),
      radial-gradient(1px 1px at 170px 300px, white, transparent),
      radial-gradient(2px 2px at 230px 100px, rgba(180,220,255,0.9), transparent),
      radial-gradient(1px 1px at 300px 200px, white, transparent),
      radial-gradient(1px 1px at 260px 400px, white, transparent),
      radial-gradient(1px 1px at 60px 500px, white, transparent);
    background-size: 400px 800px;
    animation: drift 140s linear infinite;
  }
  @keyframes drift { to { background-position: -400px -800px; } }

  .viewport { position: relative; height: 100%; display: flex; flex-direction: column; }

  /* ============ HEADER ============ */
  .app-head {
    position: relative; z-index: 50;
    display: flex; align-items: center; gap: 10px;
    padding: 44px 18px 10px;
    height: 88px; flex-shrink: 0;
  }
  .swatch {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--el-magic);
    display: grid; place-items: center;
    color: #fff; font-family: "Titan One"; font-size: 18px;
    box-shadow: inset 0 0 0 2px var(--gi), inset 0 0 0 5px var(--g), inset 0 2px 0 3px var(--gb), inset 0 -3px 0 3px var(--gs), 0 0 0 1px #000, 0 3px 10px rgba(0,0,0,0.6);
  }
  .profile-name { font-family: "Titan One"; font-size: 13px; color: var(--gb); letter-spacing: 0.04em; text-shadow: 0 1px 0 var(--gs); }
  .game-label { font-size: 10px; color: rgba(255,255,255,0.5); font-style: italic; letter-spacing: 0.1em; margin-top: 2px; }
  .head-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  .pip { width: 8px; height: 8px; border-radius: 50%; background: #65d68c; box-shadow: 0 0 8px #65d68c; animation: pip-breathe 2.2s ease-in-out infinite; }
  @keyframes pip-breathe { 50% { opacity: 0.4; } }
  .pip-label { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.5); }
  .kebab-btn {
    width: 42px; height: 42px;
    background: transparent;
    border: 1.5px solid rgba(245,198,52,0.3);
    color: var(--gb);
    font-family: "Titan One"; font-size: 22px; line-height: 0;
    border-radius: 12px; cursor: pointer;
    display: grid; place-items: center;
    flex-shrink: 0;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .kebab-btn:hover { border-color: var(--gb); background: rgba(245,198,52,0.1); }

  /* ============ BOX BACKDROP (faded, behind everything) ============ */
  .box-backdrop {
    position: absolute; top: 88px; left: 0; right: 0; bottom: 0;
    background: linear-gradient(180deg, var(--wood-4) 0%, #1a0e06 4%, #0e0804 20%, #080402 100%);
    z-index: 5;
    transition: opacity 0.5s ease;
  }
  .box-backdrop::before, .box-backdrop::after {
    content: ""; position: absolute; top: 0; bottom: 0; width: 6px; z-index: 1;
  }
  .box-backdrop::before { left: 0; background: linear-gradient(180deg, var(--wood-1), var(--wood-3)); box-shadow: inset -2px 0 4px rgba(255,215,106,0.08); }
  .box-backdrop::after { right: 0; background: linear-gradient(180deg, var(--wood-1), var(--wood-3)); box-shadow: inset 2px 0 4px rgba(255,215,106,0.08); }
  /* open lid stays at top */
  .box-backdrop-lid {
    position: absolute; top: 0; left: 0; right: 0;
    height: 52px;
    background:
      repeating-linear-gradient(180deg, var(--wood-2) 0px, var(--wood-1) 2px, var(--wood-1) 18px, var(--wood-3) 19px, rgba(0,0,0,0.4) 20px, var(--wood-2) 21px),
      linear-gradient(180deg, var(--wood-1), var(--wood-2));
    border-bottom: 3px solid var(--wood-gold);
    border-top: 2px solid var(--wood-gold);
  }

  /* ghost figures in the background — scroll position preserved */
  .ghost-grid {
    position: absolute; top: 64px; left: 6px; right: 6px; bottom: 0;
    padding: 16px;
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px 10px;
    z-index: 6;
    opacity: 0.25;
    transition: opacity 0.5s ease;
    pointer-events: none;
  }
  .ghost-card {
    position: relative; aspect-ratio: 1;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 25%, var(--gb), var(--g) 22%, var(--gm) 55%, var(--gs));
    box-shadow: inset 0 0 0 2px var(--gi), inset 0 3px 4px rgba(255,255,255,0.3), inset 0 -3px 4px rgba(0,0,0,0.5);
  }
  .ghost-plate {
    position: absolute; inset: 10%; border-radius: 50%;
    display: grid; place-items: center;
    color: rgba(255,255,255,0.4); font-family: "Titan One"; font-size: 14px;
  }

  /* ============ DETAIL PANEL (the blue box) ============ */
  .detail-surface {
    position: absolute; top: 100px; left: 18px; right: 18px; bottom: 28px;
    border-radius: 28px;
    background:
      radial-gradient(ellipse 120% 80% at 50% 0%, rgba(255,230,120,0.08), transparent 60%),
      linear-gradient(180deg, rgba(26,58,138,0.92), rgba(10,36,100,0.95) 50%, rgba(6,20,54,0.96));
    border: 2px solid transparent;
    background-clip: padding-box;
    z-index: 20;
    padding: 20px;
    display: flex; flex-direction: column;
    animation: panel-in 0.5s cubic-bezier(.3,1.3,.5,1) both;
    animation-delay: 0.12s;
    opacity: 0;
  }
  @keyframes panel-in {
    from { opacity: 0; transform: scale(0.93); }
    to { opacity: 1; transform: scale(1); }
  }
  .detail-surface::before {
    content: ""; position: absolute; inset: -2px;
    border-radius: 30px;
    background: linear-gradient(135deg, var(--gb) 0%, var(--gm) 30%, var(--gb) 50%, var(--gm) 70%, var(--gb) 100%);
    z-index: -1;
  }
  /* Lifted hero figure — lives above the panel edge */
  .hero-wrap {
    position: relative;
    margin-top: -50px;
    display: flex; justify-content: center;
    z-index: 30;
  }
  .hero-aura {
    position: absolute; inset: -24px;
    background: radial-gradient(circle, rgba(255,230,120,0.28) 0%, rgba(255,230,120,0.08) 45%, transparent 70%);
    filter: blur(14px);
    animation: aura-breathe 3.5s ease-in-out infinite;
    z-index: 0;
  }
  @keyframes aura-breathe {
    50% { transform: scale(1.08); opacity: 0.75; }
  }
  /* Rotating rays — tight to the bezel, blurred for soft edges, masked to fade out */
  .hero-rays {
    position: absolute; inset: -8px;
    border-radius: 50%;
    background: conic-gradient(from 0deg,
      transparent 0%, rgba(255,230,120,0.5) 8%, transparent 22%,
      transparent 40%, rgba(255,230,120,0.35) 48%, transparent 62%,
      transparent 75%, rgba(255,230,120,0.45) 83%, transparent 97%);
    animation: rays-spin 12s linear infinite;
    z-index: 0;
    filter: blur(8px);
    opacity: 0.85;
    /* fade rays out toward the outer edge so they don't bleed onto the panel */
    mask: radial-gradient(circle, black 50%, rgba(0,0,0,0.5) 72%, transparent 90%);
    -webkit-mask: radial-gradient(circle, black 50%, rgba(0,0,0,0.5) 72%, transparent 90%);
  }
  @keyframes rays-spin { to { transform: rotate(360deg); } }
  .hero-bezel {
    position: relative;
    width: 160px; height: 160px;
    border-radius: 50%;
    z-index: 2;
    animation: hero-lift 0.6s cubic-bezier(.3,1.3,.5,1) both;
    animation-delay: 0.05s;
  }
  @keyframes hero-lift {
    from { transform: translateY(40px) scale(0.5); opacity: 0; }
    to { transform: translateY(0) scale(1); opacity: 1; }
  }
  .hero-bezel .bezel-ring {
    position: absolute; inset: 0; border-radius: 50%;
    background: radial-gradient(circle at 30% 25%, var(--gb) 0%, var(--g) 22%, var(--gm) 55%, var(--gs) 100%);
    box-shadow:
      inset 0 0 0 3px var(--gi),
      inset 0 5px 6px rgba(255,255,255,0.4),
      inset 0 -5px 6px rgba(0,0,0,0.5),
      0 0 0 1px #000,
      0 10px 30px rgba(0,0,0,0.7),
      0 0 40px rgba(245,198,52,0.3);
  }
  .hero-bezel .bezel-plate {
    position: absolute; inset: 10%; border-radius: 50%;
    background: var(--el-fire);
    box-shadow:
      inset 0 0 0 2px rgba(0,0,0,0.6),
      inset 0 6px 14px rgba(255,255,255,0.3),
      inset 0 -10px 18px rgba(0,0,0,0.5);
    display: grid; place-items: center;
    color: #fff; font-family: "Titan One"; font-size: 68px;
    text-shadow: 0 4px 10px rgba(0,0,0,0.7);
  }
  .hero-idle { animation: hero-float 5s ease-in-out infinite 0.6s; }
  @keyframes hero-float {
    50% { transform: translateY(-6px); }
  }

  /* Name + subtitle */
  .hero-name-wrap { text-align: center; margin-top: 20px; }
  .hero-name {
    font-family: "Titan One"; font-size: 36px; letter-spacing: 0.06em;
    color: var(--gb);
    -webkit-text-stroke: 1.5px var(--gi);
    text-shadow:
      0 2px 0 var(--gs), 0 3px 0 var(--gi),
      0 0 20px rgba(245,198,52,0.5),
      0 5px 12px rgba(0,0,0,0.6);
    line-height: 1;
  }
  .hero-meta {
    font-family: "Fraunces"; font-style: italic;
    font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase;
    color: rgba(255,107,42,0.85);
    margin-top: 6px;
    text-shadow: 0 0 10px rgba(255,107,42,0.4);
  }

  /* Action icon row (future: variants, stats, reset) */
  .action-row {
    display: flex; justify-content: center; gap: 16px;
    margin-top: 22px;
  }
  .action-btn {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 25%, rgba(255,230,120,0.2), rgba(110,74,0,0.25) 60%, rgba(0,0,0,0.4));
    border: 1.5px solid rgba(245,198,52,0.4);
    color: var(--gb);
    font-size: 22px;
    cursor: pointer;
    display: grid; place-items: center;
    position: relative;
    transition: transform 0.15s ease, border-color 0.2s, box-shadow 0.2s;
  }
  .action-btn:hover {
    border-color: var(--gb);
    box-shadow: 0 0 16px rgba(245,198,52,0.35);
    transform: translateY(-2px);
  }
  .action-btn::after {
    content: attr(data-label);
    position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%);
    font-family: "Fraunces"; font-size: 9px; font-style: italic;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: rgba(255,230,120,0.55);
    white-space: nowrap;
  }

  /* Stats preview strip — placeholder content from 6.2 parser */
  .stats-strip {
    display: flex; justify-content: space-around;
    margin-top: 36px;
    padding: 12px 6px;
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(245,198,52,0.2);
    border-radius: 14px;
  }
  .stat-cell { text-align: center; }
  .stat-v {
    font-family: "Titan One"; font-size: 18px;
    color: var(--gb);
    text-shadow: 0 1px 0 var(--gs), 0 0 10px rgba(245,198,52,0.3);
    letter-spacing: 0.04em;
  }
  .stat-k {
    font-family: "Fraunces"; font-style: italic; font-size: 9px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    margin-top: 2px;
  }

  /* Spacer pushes buttons to bottom */
  .spacer { flex: 1; }

  /* Buttons */
  .btn-primary, .btn-secondary {
    width: 100%; padding: 14px; margin-top: 10px;
    font-family: "Titan One"; font-size: 14px;
    letter-spacing: 0.2em;
    border-radius: 14px; cursor: pointer;
  }
  .btn-primary {
    color: var(--ink);
    background: linear-gradient(180deg, var(--gb), var(--g) 50%, var(--gm));
    border: 2px solid var(--gi);
    text-shadow: 0 1px 0 rgba(255,255,255,0.4);
    box-shadow:
      inset 0 2px 0 rgba(255,255,255,0.45),
      inset 0 -2px 0 rgba(110,74,0,0.3),
      0 4px 0 var(--gi),
      0 6px 14px rgba(245,198,52,0.3);
  }
  .btn-primary:active {
    transform: translateY(2px);
    box-shadow: inset 0 2px 0 rgba(255,255,255,0.45), 0 2px 0 var(--gi);
  }
  .btn-secondary {
    background: transparent;
    color: rgba(255,230,120,0.75);
    border: 1.5px solid rgba(245,198,52,0.3);
  }
  .btn-secondary:hover { border-color: var(--gb); color: var(--gb); }

  /* ============ LOADING STATE ============ */
  .loading-ring {
    position: absolute; inset: -12px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, transparent 0%, transparent 65%, var(--gb) 90%, rgba(255,255,255,0.95) 96%, transparent 100%);
    animation: ring-spin 0.9s linear infinite;
    z-index: 3;
    mask: radial-gradient(circle, transparent 54%, black 58%, black 72%, transparent 76%);
    -webkit-mask: radial-gradient(circle, transparent 54%, black 58%, black 72%, transparent 76%);
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  @keyframes ring-spin { to { transform: rotate(360deg); } }
  .viewport.loading .loading-ring { opacity: 1; }
  .viewport.loading .hero-bezel .bezel-plate { opacity: 0.55; transition: opacity 0.3s ease; }
  /* Kill the aura + rays while loading or errored — the ring/shudder are the motion focus. */
  .viewport.loading .hero-aura,
  .viewport.errored .hero-aura,
  .viewport.loading .hero-rays,
  .viewport.errored .hero-rays {
    opacity: 0;
    animation: none;
    transition: opacity 0.25s ease;
  }
  .viewport.loading .hero-idle,
  .viewport.errored .hero-idle {
    animation: none;
  }
  /* Disable mid-flight actions (appearance/stats/place) but KEEP back-to-box active
     so the user can always bail if the server is slow or unreachable. */
  .viewport.loading .action-row,
  .viewport.loading .stats-strip,
  .viewport.loading .btn-primary { pointer-events: none; opacity: 0.35; transition: opacity 0.25s ease; }
  .viewport.loading .btn-secondary {
    border-color: var(--gb);
    color: var(--gb);
    box-shadow: 0 0 14px rgba(245,198,52,0.2);
  }
  .viewport.loading .hero-meta::after {
    content: " · loading";
    color: var(--gb);
    animation: blink 1s ease-in-out infinite;
  }
  @keyframes blink { 50% { opacity: 0.4; } }

  /* ============ ERROR STATE ============ */
  .error-banner {
    position: absolute; left: 18px; right: 18px; top: 106px;
    z-index: 50;
    padding: 12px 16px;
    background: rgba(227,76,76,0.92);
    border: 2px solid #7a1818;
    border-radius: 14px;
    display: flex; align-items: center; gap: 12px;
    color: #fff;
    font-family: "Fraunces"; font-weight: 600;
    font-size: 13px; line-height: 1.3;
    box-shadow: 0 8px 20px rgba(227,76,76,0.4);
    transform: translateY(-20px);
    opacity: 0;
    transition: transform 0.3s ease, opacity 0.3s ease;
    pointer-events: none;
  }
  .error-banner .err-icon {
    font-family: "Titan One"; font-size: 18px;
    color: #fff; background: rgba(0,0,0,0.3);
    width: 28px; height: 28px; border-radius: 50%;
    display: grid; place-items: center; flex-shrink: 0;
  }
  .viewport.errored .error-banner {
    transform: translateY(0); opacity: 1; pointer-events: auto;
  }
  .viewport.errored .hero-bezel .bezel-ring {
    background: radial-gradient(circle at 30% 25%, #ff9b9b 0%, #e34c4c 35%, #7a1818 100%);
    animation: shudder 0.4s ease-in-out 2;
  }
  @keyframes shudder { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }

  /* ============ STATE DEMO CONTROLS (dev only) ============ */
  .demo-controls {
    position: fixed; bottom: 16px; right: 16px;
    z-index: 999;
    background: rgba(0,0,0,0.85);
    border: 1px solid #333; border-radius: 10px;
    padding: 10px;
    display: flex; gap: 6px; flex-direction: column;
    font-family: system-ui; font-size: 11px;
  }
  .demo-controls button {
    padding: 6px 10px;
    background: #222; color: #ddd;
    border: 1px solid #444; border-radius: 6px;
    cursor: pointer; font-size: 11px;
  }
  .demo-controls button:hover { background: #333; color: var(--gb); }
  .demo-controls .title { color: var(--gb); font-weight: 600; margin-bottom: 2px; }
  @media (max-width: 450px) { .demo-controls { display: none; } }
</style>
</head>
<body>
  <div class="phone">
    <div class="sky"></div>
    <div class="stars"></div>

    <div class="viewport" id="viewport">
      <header class="app-head">
        <button class="kebab-btn" title="Menu">⋮</button>
        <div class="swatch" style="background: var(--el-magic);">F</div>
        <div><div class="profile-name">FINN</div><div class="game-label">Trap Team</div></div>
        <div class="head-right">
          <span class="pip-label">live</span>
          <span class="pip"></span>
        </div>
      </header>

      <!-- Faded box backdrop with ghost figures -->
      <div class="box-backdrop">
        <div class="box-backdrop-lid"></div>
      </div>
      <div class="ghost-grid">
        <div class="ghost-card"><div class="ghost-plate">E</div></div>
        <div class="ghost-card"><div class="ghost-plate">G</div></div>
        <div class="ghost-card"><div class="ghost-plate">S</div></div>
        <div class="ghost-card"><div class="ghost-plate">S</div></div>
        <div class="ghost-card"><div class="ghost-plate">T</div></div>
        <div class="ghost-card"><div class="ghost-plate">C</div></div>
        <div class="ghost-card"><div class="ghost-plate">B</div></div>
        <div class="ghost-card"><div class="ghost-plate">J</div></div>
        <div class="ghost-card"><div class="ghost-plate">F</div></div>
        <div class="ghost-card"><div class="ghost-plate">W</div></div>
        <div class="ghost-card"><div class="ghost-plate">W</div></div>
        <div class="ghost-card"><div class="ghost-plate">Z</div></div>
      </div>

      <!-- DETAIL PANEL -->
      <div class="detail-surface">
        <div class="hero-wrap">
          <div class="hero-aura"></div>
          <div class="hero-rays"></div>
          <div class="hero-bezel hero-idle">
            <div class="bezel-ring"></div>
            <div class="bezel-plate">E</div>
            <div class="loading-ring"></div>
          </div>
        </div>

        <div class="hero-name-wrap">
          <h2 class="hero-name">ERUPTOR</h2>
          <div class="hero-meta">FIRE · SKYLANDERS GIANTS</div>
        </div>

        <div class="action-row">
          <button class="action-btn" data-label="appearance">✦</button>
          <button class="action-btn" data-label="stats">☰</button>
          <button class="action-btn" data-label="reset">↺</button>
        </div>

        <div class="stats-strip">
          <div class="stat-cell"><div class="stat-v">12</div><div class="stat-k">LEVEL</div></div>
          <div class="stat-cell"><div class="stat-v">8,420</div><div class="stat-k">GOLD</div></div>
          <div class="stat-cell"><div class="stat-v">4h 22m</div><div class="stat-k">PLAYED</div></div>
        </div>

        <div class="spacer"></div>

        <button class="btn-primary">PLACE ON PORTAL</button>
        <button class="btn-secondary">BACK TO BOX</button>
      </div>

      <!-- Error banner (slides in when .viewport.errored) -->
      <div class="error-banner">
        <div class="err-icon">!</div>
        <div>
          <strong>File in use</strong><br>
          Eruptor is already on the portal in another slot.
        </div>
      </div>
    </div>
  </div>

  <div class="demo-controls">
    <div class="title">Demo states</div>
    <button onclick="set('')">default</button>
    <button onclick="set('loading')">loading</button>
    <button onclick="set('errored')">errored</button>
  </div>

<script>
  function set(state) {
    const vp = document.getElementById('viewport');
    vp.classList.remove('loading', 'errored');
    if (state) vp.classList.add(state);
  }
</script>
</body>
</html>
