<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=390,initial-scale=1,viewport-fit=cover">
<title>Option A — Heraldic — Skylanders Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Titan+One&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,800;1,9..144,400&display=swap" rel="stylesheet">
<style>
  :root {
    --starfield-1: #0b1e52;
    --starfield-2: #061436;
    --starfield-3: #020818;
    --gold-bright: #ffe58a;
    --gold: #f5c634;
    --gold-mid: #c58c18;
    --gold-shadow: #6e4a00;
    --gold-inner: #3a2500;
    --text: #f7f7fb;
    --ink: #1a1203;
    --danger: #e34c4c;
    --success: #65d68c;
    --el-fire: linear-gradient(135deg, #ff6b2a, #b13310);
    --el-water: linear-gradient(135deg, #2aa6ff, #0f4d8a);
    --el-life: linear-gradient(135deg, #5ac96b, #26612e);
    --el-magic: linear-gradient(135deg, #da5ad6, #651564);
    --el-undead: linear-gradient(135deg, #8a62c9, #3b215f);
    --el-tech: linear-gradient(135deg, #ffb84d, #a56500);
    --el-earth: linear-gradient(135deg, #a77b3a, #5a3a13);
    --el-air: linear-gradient(135deg, #c6e6ff, #7ea9cc);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Fraunces", Georgia, serif;
    background: #0a0a0a;
    display: grid; place-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  .phone {
    width: 390px; height: 844px;
    border-radius: 52px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 12px #1a1a1a, 0 0 0 13px #333;
    background: var(--starfield-3);
  }
  @media (max-width: 450px) {
    body { padding: 0; background: var(--starfield-3); }
    .phone { width: 100vw; height: 100vh; border-radius: 0; box-shadow: none; }
  }
  .sky {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 120% 60% at 50% 0%, #1a3a8a 0%, transparent 50%),
      radial-gradient(ellipse 80% 50% at 50% 100%, #0e2464 0%, transparent 50%),
      radial-gradient(ellipse at 20% 30%, rgba(255,255,255,0.08) 0%, transparent 40%),
      linear-gradient(180deg, var(--starfield-1) 0%, var(--starfield-2) 60%, var(--starfield-3) 100%);
  }
  .stars {
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 20px 30px, white, transparent),
      radial-gradient(1px 1px at 40px 70px, rgba(255,255,255,0.7), transparent),
      radial-gradient(2px 2px at 50px 160px, rgba(255,230,180,0.9), transparent),
      radial-gradient(1px 1px at 130px 40px, white, transparent),
      radial-gradient(1px 1px at 90px 250px, rgba(255,255,255,0.8), transparent),
      radial-gradient(1px 1px at 170px 300px, white, transparent),
      radial-gradient(2px 2px at 230px 100px, rgba(180,220,255,0.9), transparent),
      radial-gradient(1px 1px at 300px 200px, white, transparent),
      radial-gradient(1px 1px at 350px 50px, rgba(255,255,255,0.7), transparent),
      radial-gradient(1px 1px at 260px 400px, white, transparent),
      radial-gradient(1px 1px at 60px 500px, white, transparent),
      radial-gradient(1px 1px at 200px 600px, rgba(255,255,255,0.6), transparent),
      radial-gradient(2px 2px at 320px 720px, rgba(180,220,255,0.9), transparent),
      radial-gradient(1px 1px at 140px 780px, white, transparent);
    background-size: 400px 800px;
    animation: drift 140s linear infinite;
  }
  @keyframes drift { to { background-position: -400px -800px; } }

  .screen {
    position: relative; height: 100%;
    display: flex; flex-direction: column;
    padding: 44px 16px 24px;
    overflow-y: auto;
  }
  .screen::-webkit-scrollbar { display: none; }

  header.app-head {
    display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
  }
  .profile-chip { display: flex; align-items: center; gap: 9px; }
  .swatch {
    width: 42px; height: 42px; border-radius: 50%;
    background: var(--el-magic);
    display: grid; place-items: center;
    color: #fff;
    font-family: "Titan One", serif;
    font-size: 20px;
    position: relative;
    box-shadow:
      inset 0 0 0 2px var(--gold-inner),
      inset 0 0 0 5px var(--gold),
      inset 0 2px 0 3px var(--gold-bright),
      inset 0 -3px 0 3px var(--gold-shadow),
      0 0 0 1px #000,
      0 4px 12px rgba(0,0,0,0.6);
  }
  .profile-name {
    font-family: "Titan One"; font-size: 14px; letter-spacing: 0.04em;
    color: var(--gold-bright);
    text-shadow: 0 1px 0 var(--gold-shadow), 0 0 8px rgba(245,198,52,0.4);
  }
  .game-label {
    font-size: 10px; font-weight: 600; font-style: italic;
    color: rgba(255,255,255,0.55);
    text-transform: uppercase; letter-spacing: 0.18em;
  }
  .head-right { margin-left: auto; display: flex; gap: 6px; align-items: center; }
  .pip {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 8px var(--success);
    animation: breathe 2.2s ease-in-out infinite;
  }
  @keyframes breathe { 50% { opacity: 0.45; } }
  .icon-btn {
    width: 36px; height: 36px;
    background: transparent; border: 1px solid rgba(245,198,52,0.3);
    color: var(--gold-bright);
    font-size: 16px;
    border-radius: 10px;
    display: grid; place-items: center;
    cursor: pointer;
  }
  .icon-btn.quit { color: #ff9b9b; border-color: rgba(227,76,76,0.4); }

  .title-wrap { text-align: center; padding: 4px 0 12px; position: relative; }
  .title-rays {
    position: absolute; inset: -18px 0;
    background: radial-gradient(ellipse 60% 65% at 50% 50%, rgba(255,230,120,0.14), transparent 62%);
  }
  .title {
    font-family: "Titan One";
    font-size: 46px;
    letter-spacing: 0.08em;
    color: var(--gold-bright);
    -webkit-text-stroke: 2px var(--gold-inner);
    text-shadow:
      0 2px 0 var(--gold-shadow),
      0 3px 0 var(--gold-shadow),
      0 4px 0 var(--gold-inner),
      0 6px 12px rgba(0,0,0,0.5),
      0 0 40px rgba(245,198,52,0.3);
  }
  .subtitle {
    font-family: "Fraunces"; font-style: italic;
    font-size: 12px; color: rgba(255,230,120,0.7);
    letter-spacing: 0.25em; text-transform: uppercase;
    margin-top: 2px;
  }

  .portal-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px 8px;
    padding: 8px 2px 8px;
  }
  .slot { position: relative; aspect-ratio: 1; }
  .bezel {
    position: absolute; inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 25%, var(--gold-bright) 0%, var(--gold) 22%, var(--gold-mid) 55%, var(--gold-shadow) 100%);
    box-shadow:
      inset 0 0 0 2px var(--gold-inner),
      inset 0 3px 4px rgba(255,255,255,0.3),
      inset 0 -3px 4px rgba(0,0,0,0.5),
      0 0 0 1px #000,
      0 4px 10px rgba(0,0,0,0.6);
  }
  .plate {
    position: absolute; inset: 10%;
    border-radius: 50%;
    background: var(--el-fire);
    box-shadow:
      inset 0 0 0 1px rgba(0,0,0,0.6),
      inset 0 4px 8px rgba(255,255,255,0.25),
      inset 0 -6px 10px rgba(0,0,0,0.5);
    display: grid; place-items: center;
    color: #fff;
    font-family: "Titan One";
    font-size: 24px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.6);
  }
  .slot.empty .bezel {
    background: radial-gradient(circle at 30% 25%, rgba(245,198,52,0.2), rgba(110,74,0,0.25) 60%, rgba(0,0,0,0.35) 100%);
    box-shadow:
      inset 0 0 0 1.5px rgba(0,0,0,0.45),
      inset 0 2px 4px rgba(255,255,255,0.08),
      inset 0 -2px 4px rgba(0,0,0,0.3);
  }
  .slot.empty .plate {
    background: rgba(10,26,54,0.75);
    color: rgba(245,198,52,0.55);
    font-size: 26px;
    text-shadow: none;
  }
  .slot.picking::before {
    content: "";
    position: absolute; inset: -8px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, transparent, rgba(255,230,120,0.9), transparent 30%, rgba(255,230,120,0.5) 62%, transparent);
    animation: halo 3.2s linear infinite;
    filter: blur(5px);
    z-index: 0;
  }
  @keyframes halo { to { transform: rotate(360deg); } }
  .slot.picking .bezel {
    transform: scale(1.06);
    box-shadow:
      inset 0 0 0 2px var(--gold-inner),
      inset 0 3px 4px rgba(255,255,255,0.5),
      inset 0 -3px 4px rgba(0,0,0,0.5),
      0 0 0 1px #000,
      0 0 22px 4px rgba(255,230,120,0.75),
      0 4px 10px rgba(0,0,0,0.6);
  }
  .slot.picking .plate { transform: scale(1.06); }
  .slot.loading .plate { opacity: 0.55; }
  .slot.loading::after {
    content: "";
    position: absolute; inset: -2px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, transparent 0%, transparent 70%, var(--gold-bright) 88%, rgba(255,255,255,0.95) 95%, transparent 100%);
    animation: halo 0.9s linear infinite;
    z-index: 2;
    mask: radial-gradient(circle, transparent 56%, black 60%, black 72%, transparent 76%);
    -webkit-mask: radial-gradient(circle, transparent 56%, black 60%, black 72%, transparent 76%);
  }
  .slot.errored .bezel {
    background: radial-gradient(circle at 30% 25%, #ff9b9b 0%, #e34c4c 35%, #7a1818 100%);
    animation: shudder 0.35s ease-in-out 2;
    box-shadow:
      inset 0 0 0 2px #3a0808,
      inset 0 3px 4px rgba(255,200,200,0.3),
      inset 0 -3px 4px rgba(0,0,0,0.5),
      0 0 20px rgba(227,76,76,0.5),
      0 4px 10px rgba(0,0,0,0.6);
  }
  @keyframes shudder {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-2px); }
    75% { transform: translateX(2px); }
  }
  .slot-label {
    position: absolute;
    bottom: -12px; left: 50%; transform: translateX(-50%);
    font-family: "Titan One";
    font-size: 8.5px; letter-spacing: 0.1em;
    color: var(--gold-bright);
    text-shadow: 0 1px 0 #000, 0 0 6px rgba(0,0,0,0.9);
    white-space: nowrap;
    z-index: 3;
  }
  .slot-index {
    position: absolute;
    top: -3px; left: -3px;
    font-family: "Titan One"; font-size: 10px;
    color: var(--gold-inner);
    background: var(--gold-bright);
    border-radius: 50%;
    width: 18px; height: 18px;
    display: grid; place-items: center;
    box-shadow: 0 0 0 1.5px var(--gold-inner), 0 2px 4px rgba(0,0,0,0.5);
    z-index: 3;
  }
  .owner-dot {
    position: absolute;
    top: -2px; right: -2px;
    width: 14px; height: 14px;
    border-radius: 50%;
    box-shadow: 0 0 0 2px #000, 0 0 0 3px var(--gold-bright), 0 2px 4px rgba(0,0,0,0.6);
    z-index: 3;
  }
  .slot-idle-float { animation: float 4.5s ease-in-out infinite; }
  @keyframes float { 50% { transform: translateY(-2px); } }

  .plaque {
    margin: 22px 2px 0;
    padding: 16px 16px 14px;
    position: relative;
    border-radius: 18px;
    background:
      linear-gradient(180deg, rgba(16,40,90,0.85), rgba(8,22,60,0.9)),
      radial-gradient(ellipse 120% 80% at 50% 0%, rgba(255,230,120,0.10), transparent 60%);
    border: 2px solid transparent;
    background-clip: padding-box;
  }
  .plaque::before {
    content: "";
    position: absolute; inset: -2px;
    border-radius: 20px;
    background: linear-gradient(135deg, var(--gold-bright) 0%, var(--gold-mid) 50%, var(--gold-bright) 100%);
    z-index: -1;
  }
  .corner {
    position: absolute;
    width: 14px; height: 14px;
    border: 2px solid var(--gold-bright);
    pointer-events: none;
  }
  .corner.tl { top: 4px; left: 4px; border-right: 0; border-bottom: 0; }
  .corner.tr { top: 4px; right: 4px; border-left: 0; border-bottom: 0; }
  .corner.bl { bottom: 4px; left: 4px; border-right: 0; border-top: 0; }
  .corner.br { bottom: 4px; right: 4px; border-left: 0; border-top: 0; }
  .plaque h3 {
    font-family: "Titan One";
    font-size: 13px; letter-spacing: 0.18em;
    color: var(--gold-bright);
    text-align: center;
    margin-bottom: 10px;
    text-shadow: 0 2px 0 var(--gold-shadow);
  }
  .mini-row { display: flex; gap: 8px; overflow-x: auto; padding: 2px; margin-bottom: 10px; }
  .mini-row::-webkit-scrollbar { display: none; }
  .mini {
    flex: 0 0 52px; aspect-ratio: 1; position: relative;
  }
  .mini .bezel {
    box-shadow:
      inset 0 0 0 1.5px var(--gold-inner),
      inset 0 2px 3px rgba(255,255,255,0.3),
      inset 0 -2px 3px rgba(0,0,0,0.5),
      0 2px 6px rgba(0,0,0,0.5);
  }
  .mini .plate { font-size: 14px; }
  .browse-btn {
    width: 100%;
    padding: 12px;
    font-family: "Titan One";
    font-size: 13px; letter-spacing: 0.2em;
    color: var(--ink);
    background: linear-gradient(180deg, var(--gold-bright) 0%, var(--gold) 50%, var(--gold-mid) 100%);
    border: 2px solid var(--gold-inner);
    border-radius: 14px;
    cursor: pointer;
    text-shadow: 0 1px 0 rgba(255,255,255,0.45);
    box-shadow:
      inset 0 2px 0 rgba(255,255,255,0.45),
      inset 0 -3px 0 rgba(110,74,0,0.35),
      0 4px 0 var(--gold-inner),
      0 6px 10px rgba(0,0,0,0.4);
  }
  .browse-btn:active {
    transform: translateY(2px);
    box-shadow:
      inset 0 2px 0 rgba(255,255,255,0.45),
      inset 0 -3px 0 rgba(110,74,0,0.35),
      0 2px 0 var(--gold-inner),
      0 4px 6px rgba(0,0,0,0.4);
  }

  .el-fire .plate { background: var(--el-fire); }
  .el-water .plate { background: var(--el-water); }
  .el-life .plate { background: var(--el-life); }
  .el-magic .plate { background: var(--el-magic); }
  .el-undead .plate { background: var(--el-undead); }
  .el-tech .plate { background: var(--el-tech); }
  .el-earth .plate { background: var(--el-earth); }
  .el-air .plate { background: var(--el-air); color: var(--ink); text-shadow: 0 1px 2px rgba(255,255,255,0.6); }

  .tagline {
    position: absolute; bottom: 14px; left: 0; right: 0;
    text-align: center;
    font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
    color: rgba(255,230,120,0.4);
    font-family: "Fraunces"; font-style: italic;
  }

  /* Picking announcement — replaces the old sticky banner. */
  .picking-announce {
    margin: 2px 2px 4px;
    text-align: center;
    font-family: "Titan One";
    font-size: 11px; letter-spacing: 0.22em;
    color: var(--gold-bright);
    text-shadow: 0 1px 0 #000, 0 0 8px rgba(245,198,52,0.6);
    padding: 6px;
    border-top: 1px solid rgba(245,198,52,0.25);
    border-bottom: 1px solid rgba(245,198,52,0.25);
    position: relative;
  }
  .picking-announce::before, .picking-announce::after {
    content: "◆";
    position: absolute; top: 50%; transform: translateY(-50%);
    color: var(--gold); font-size: 8px;
  }
  .picking-announce::before { left: 20%; }
  .picking-announce::after { right: 20%; }
</style>
</head>
<body>
  <div class="phone">
    <div class="sky"></div>
    <div class="stars"></div>
    <div class="screen">
      <header class="app-head">
        <div class="profile-chip">
          <div class="swatch" style="background: var(--el-magic);">F</div>
          <div>
            <div class="profile-name">FINN</div>
            <div class="game-label">Trap Team</div>
          </div>
        </div>
        <div class="head-right">
          <span class="pip" title="Connected"></span>
          <button class="icon-btn" title="Show join code">⌘</button>
          <button class="icon-btn quit" title="Quit game">✕</button>
        </div>
      </header>

      <div class="title-wrap">
        <div class="title-rays"></div>
        <h1 class="title">PORTAL</h1>
        <div class="subtitle">choose your champions</div>
      </div>

      <div class="picking-announce">PICKING FOR SLOT 3 · TAP TO CANCEL</div>

      <div class="portal-grid">
        <div class="slot el-fire slot-idle-float">
          <div class="slot-index">1</div>
          <div class="owner-dot" style="background: var(--el-magic);"></div>
          <div class="bezel"></div>
          <div class="plate">E</div>
          <div class="slot-label">ERUPTOR</div>
        </div>
        <div class="slot el-water loading">
          <div class="slot-index">2</div>
          <div class="bezel"></div>
          <div class="plate">G</div>
          <div class="slot-label">LOADING…</div>
        </div>
        <div class="slot empty picking">
          <div class="slot-index">3</div>
          <div class="bezel"></div>
          <div class="plate">+</div>
          <div class="slot-label">PICK A HERO</div>
        </div>
        <div class="slot empty">
          <div class="slot-index">4</div>
          <div class="bezel"></div>
          <div class="plate">+</div>
        </div>
        <div class="slot el-magic slot-idle-float" style="animation-delay: -1.1s;">
          <div class="slot-index">5</div>
          <div class="owner-dot" style="background: var(--el-magic);"></div>
          <div class="bezel"></div>
          <div class="plate">S</div>
          <div class="slot-label">SPYRO</div>
        </div>
        <div class="slot el-life slot-idle-float" style="animation-delay: -2.3s;">
          <div class="slot-index">6</div>
          <div class="owner-dot" style="background: var(--el-fire);"></div>
          <div class="bezel"></div>
          <div class="plate">S</div>
          <div class="slot-label">STEALTH ELF</div>
        </div>
        <div class="slot empty">
          <div class="slot-index">7</div>
          <div class="bezel"></div>
          <div class="plate">+</div>
        </div>
        <div class="slot errored">
          <div class="slot-index">8</div>
          <div class="bezel"></div>
          <div class="plate">!</div>
          <div class="slot-label">FILE IN USE</div>
        </div>
      </div>

      <div class="plaque">
        <span class="corner tl"></span><span class="corner tr"></span>
        <span class="corner bl"></span><span class="corner br"></span>
        <h3>RECENT HEROES</h3>
        <div class="mini-row">
          <div class="mini el-fire"><div class="bezel"></div><div class="plate">E</div></div>
          <div class="mini el-water"><div class="bezel"></div><div class="plate">W</div></div>
          <div class="mini el-tech"><div class="bezel"></div><div class="plate">T</div></div>
          <div class="mini el-earth"><div class="bezel"></div><div class="plate">B</div></div>
          <div class="mini el-undead"><div class="bezel"></div><div class="plate">C</div></div>
          <div class="mini el-air"><div class="bezel"></div><div class="plate">J</div></div>
          <div class="mini el-magic"><div class="bezel"></div><div class="plate">W</div></div>
          <div class="mini el-life"><div class="bezel"></div><div class="plate">F</div></div>
        </div>
        <button class="browse-btn">BROWSE ALL · 504</button>
      </div>

      <div class="tagline">data &amp; images from the skylanders wiki · cc by-sa</div>
    </div>
  </div>
</body>
</html>
