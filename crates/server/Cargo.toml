[package]
name = "skylander-server"
version.workspace = true
edition.workspace = true
publish.workspace = true

[[bin]]
name = "skylander-portal-controller"
path = "src/main.rs"

[dependencies]
skylander-core = { path = "../core" }
skylander-indexer = { path = "../indexer" }
skylander-rpcs3-control = { path = "../rpcs3-control" }

anyhow = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-appender = "0.2"
serde = { workspace = true }
serde_json = { workspace = true }

axum = { version = "0.7", features = ["ws"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["fs", "trace"] }
futures-util = "0.3"
eframe = { version = "0.29", default-features = false, features = ["default_fonts", "glow", "wayland", "x11"] }
egui = "0.29"
qrcode = "0.14"
image = { version = "0.25", default-features = false, features = ["png"] }
local-ip-address = "0.6"

[features]
default = ["dev-tools"]
# Relaxes behavior for development: reads .env.dev, logs to ./logs/,
# accepts SKYLANDER_PORTAL_DRIVER=mock, allows insecure helpers, etc.
dev-tools = ["skylander-rpcs3-control/mock"]
