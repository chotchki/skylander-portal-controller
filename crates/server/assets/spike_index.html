<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Skylander Portal — Spike</title>
<style>
  :root { color-scheme: dark; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         background: #0b1e3f; color: #fff; margin: 0; padding: 24px; min-height: 100vh;
         display: flex; flex-direction: column; align-items: center; }
  h1 { font-size: 28px; margin: 0 0 12px; }
  #status { opacity: 0.85; margin-bottom: 16px; }
  #log { width: 100%; max-width: 480px; background: rgba(255,255,255,0.08);
         border-radius: 12px; padding: 12px; font-family: ui-monospace, monospace;
         font-size: 14px; white-space: pre-wrap; }
  button { font-size: 18px; padding: 12px 24px; border-radius: 16px; border: 0;
           background: #ffcf3a; color: #0b1e3f; font-weight: 600; margin: 12px 0;
           cursor: pointer; }
  button:active { transform: scale(0.97); }
</style>
</head>
<body>
<h1>Skylander Portal — Spike</h1>
<div id="status">connecting…</div>
<button id="ping">send ping</button>
<div id="log"></div>
<script>
  const log = (m) => {
    const el = document.getElementById('log');
    el.textContent += m + "\n";
    el.scrollTop = el.scrollHeight;
  };
  const status = (m) => { document.getElementById('status').textContent = m; };

  const ws = new WebSocket((location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws');
  ws.onopen = () => { status('connected'); log('ws open'); };
  ws.onclose = () => { status('disconnected'); log('ws close'); };
  ws.onerror = (e) => { log('ws error'); };
  ws.onmessage = (e) => { log('server: ' + e.data); };

  document.getElementById('ping').addEventListener('click', () => {
    const msg = 'ping ' + new Date().toLocaleTimeString();
    ws.send(msg);
    log('me: ' + msg);
  });
</script>
</body>
</html>
