<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Skylander Portal">
<meta name="theme-color" content="#020818">
<title>Skylander Portal</title>

<!-- App icons. The src URLs (`/icons/icon-XXX.png`, `/manifest.webmanifest`)
     are served by the Axum server, NOT directly by trunk's static dir —
     the server intercepts those paths and swaps in the dev variants
     (icon-dev-XXX.png, manifest-dev.webmanifest) when the `dev-tools`
     feature is on. That way prod and dev installs end up with visually
     distinct home-screen icons + PWA names without a build-time swap.
     See crates/server/src/http.rs `serve_icon` / `serve_manifest`. -->
<link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png">
<link rel="icon" type="image/svg+xml" href="/icons/icon.svg">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png">
<link rel="manifest" href="/manifest.webmanifest">

<link data-trunk rel="rust" data-wasm-opt="z" />
<link data-trunk rel="copy-file" href="assets/app.css" />
<link data-trunk rel="copy-dir" href="assets/fonts" />
<link data-trunk rel="copy-dir" href="assets/icons" />
<link data-trunk rel="copy-file" href="assets/manifest.webmanifest" />
<link data-trunk rel="copy-file" href="assets/manifest-dev.webmanifest" />
<link rel="stylesheet" href="app.css" />
</head>
<body>
<div class="landscape-block" aria-hidden="true">
  <div class="landscape-block__title">Rotate your phone</div>
  <div class="landscape-block__sub">Portal Master works in portrait mode</div>
</div>
</body>
</html>
